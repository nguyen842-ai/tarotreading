<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trạm Lắng Nghe Vũ Trụ - Tarot & Lenormand</title>
    <style>
        /* ================= CSS (TRANG TRÍ GIAO DIỆN) ================= */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #1a0b2e;
            color: #e5d3b3;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
            padding: 20px;
        }

        h1 {
            margin-bottom: 20px;
            font-size: 2.5rem;
            text-shadow: 0 0 15px #c29d59;
        }

        .controls {
            margin-bottom: 20px;
            background: rgba(0, 0, 0, 0.4);
            padding: 20px;
            border-radius: 12px;
            display: inline-block;
            max-width: 800px;
            width: 100%;
            border: 1px solid #4a2b7d;
        }

        .ai-inputs {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 15px;
        }

        input[type="text"], input[type="password"] {
            padding: 12px;
            font-size: 1rem;
            border-radius: 8px;
            background: #2a164d;
            color: white;
            border: 1px solid #c29d59;
            width: 100%;
            outline: none;
        }
        
        input::placeholder {
            color: #a78bfa;
            opacity: 0.7;
        }

        select {
            padding: 10px;
            font-size: 1rem;
            border-radius: 8px;
            background: #2a164d;
            color: white;
            border: 1px solid #c29d59;
            margin-right: 10px;
            cursor: pointer;
            outline: none;
        }

        .mystic-btn {
            padding: 10px 20px;
            font-size: 1rem;
            font-weight: bold;
            color: #1a0b2e;
            background-color: #c29d59;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s;
            margin: 5px;
        }

        .mystic-btn:hover:not(:disabled) {
            background-color: #e5d3b3;
            box-shadow: 0 0 15px #c29d59;
        }

        .mystic-btn:disabled {
            background-color: #555;
            color: #888;
            cursor: not-allowed;
            box-shadow: none;
        }

        #status-message {
            font-size: 1.2rem;
            margin-bottom: 20px;
            font-style: italic;
            color: #c4b5fd;
        }

        .tarot-board {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 25px;
            max-width: 1100px;
            margin: 0 auto 30px auto;
        }

        .card-slot {
            perspective: 1000px;
            width: 150px;
            height: 260px;
            cursor: pointer;
            position: relative;
        }

        .card-label {
            position: absolute;
            top: -22px;
            left: 0;
            width: 100%;
            font-size: 0.8rem;
            color: #c29d59;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .card-inner {
            width: 100%;
            height: 100%;
            position: relative;
            transition: transform 0.6s cubic-bezier(0.4, 0.2, 0.2, 1);
            transform-style: preserve-3d;
        }

        .card-slot.flipped .card-inner {
            transform: rotateY(180deg);
        }

        .card-front, .card-back {
            width: 100%;
            height: 100%;
            position: absolute;
            backface-visibility: hidden;
            border-radius: 10px;
            box-shadow: 0 6px 12px rgba(0,0,0,0.4);
            border: 2px solid #c29d59;
        }

        .card-front {
            background-color: #2a164d; 
        }

        .card-front img, .card-back img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 8px;
        }

        .card-back {
            transform: rotateY(180deg);
            background-color: #fff;
        }

        #reading-result {
            background: rgba(42, 22, 77, 0.95);
            border: 1px solid #c29d59;
            padding: 25px 30px;
            border-radius: 12px;
            max-width: 800px;
            margin: 0 auto 40px auto;
            text-align: left;
            line-height: 1.8;
            font-size: 1.1rem;
            display: none;
            box-shadow: 0 0 25px rgba(194, 157, 89, 0.15);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔮 Trạm Lắng Nghe Vũ Trụ 🔮</h1>
        
        <div class="controls">
            <div class="ai-inputs">
                <input type="password" id="api-key" placeholder="🗝️ Nhập mật mã để bắt đầu 🗝️ ...">
                <input type="text" id="user-question" placeholder="💭 Bạn đang băn khoăn điều gì?">
            </div>

            <div>
                <label for="spread-type">Bạn muốn làm rõ điều gì?</label>
                <select id="spread-type">
                    <option value="intent_what">WHAT / YES-NO (Thông điệp nhanh, gỡ rối ngay lập tức)</option>
                    <option value="intent_why">WHY / HOW (Mổ xẻ diễn biến tâm lý & Xu hướng sắp tới)</option>
                    <option value="intent_when">WHEN / WHO (Soi chi tiết sự kiện thực tế, con người, thời gian)</option>
                    <option value="intent_all">TOÀN DIỆN (Kết hợp cả Gốc rễ nội tâm lẫn Sự kiện đời thực)</option>
                </select>
                
                <button id="btn-shuffle" class="mystic-btn">Xào Bài</button>
                <button id="btn-draw" class="mystic-btn" disabled>Bốc Bài</button>
            </div>
        </div>

        <div id="status-message">✨ Hãy đặt câu hỏi và ấn "Xào Bài" ✨...</div>
        <div id="tarot-board" class="tarot-board"></div>
        <div id="reading-result"></div>
    </div>

    <script>
        // Hệ thống bài Tarot (78 lá)
        const tarotDeck = [
            "0thefool", "1themagician", "2thehighpriestess", "3theempress", "4theemperor", 
            "5thehierophant", "6thelovers", "7thechariot", "8strength", "9thehermit", 
            "10wheeloffortune", "11justice", "12thehangedman", "13death", "14temperance", 
            "15thedevil", "16thetower", "17thestar", "18themoon", "19thesun", "20judgement", "21theworld",
            "1cup", "2cup", "3cup", "4cup", "5cup", "6cup", "7cup", "8cup", "9cup", "10cup", "pagecup", "knightcup", "queencup", "kingcup",
            "1wand", "2wand", "3wand", "4wand", "5wand", "6wand", "7wand", "8wand", "9wand", "10wand", "pagewand", "knightwand", "queenwand", "kingwand",
            "1sword", "2sword", "3sword", "4sword", "5sword", "6sword", "7sword", "8sword", "9sword", "10sword", "pagesword", "knightsword", "queensword", "kingsword",
            "1pen", "2pen", "3pen", "4pen", "5pen", "6pen", "7pen", "8pen", "9pen", "10pen", "pagepen", "knightpen", "queenpen", "kingpen"
        ];

        // Hệ thống bài Lenormand (36 lá)
        const lenormandDeck = [
            "1rider", "2clover", "3ship", "4house", "5tree", "6clover", "7snake", "8coffin",
            "9bouquet", "10scythe", "11whip", "12birds", "13child", "14fox", "15bear", "16stars",
            "17stork", "18dog", "19tower", "20garden", "21mountain", "22crossroads", "23mice", "24heart",
            "25ring", "26book", "27letter", "28man", "29woman", "30lilies", "31sun", "32moon",
            "33key", "34fish", "35anchor", "36cross"
        ];

        const pathTarot = "assets/images/new_folder/";
        const pathLenormand = "assets/images/lenormand/";
        
        const backTarot = pathTarot + "card-back.PNG";
        const backLenormand = pathLenormand + "card-back-L.jpg"; 

        let currentTarotDeck = [];
        let currentLenormandDeck = [];
        
        let drawnCardsList = []; 
        let totalCardsToDraw = 0;
        let flippedCount = 0;    
        let currentKeyIndex = 0; 
        
        let isProcessing = false; 
        let cooldownTimer = null; 

        const btnShuffle = document.getElementById("btn-shuffle");
        const btnDraw = document.getElementById("btn-draw");
        const board = document.getElementById("tarot-board");
        const statusMsg = document.getElementById("status-message");
        const spreadSelect = document.getElementById("spread-type");
        const readingBox = document.getElementById("reading-result");

        function startCooldown(seconds) {
            let timeLeft = seconds;
            btnShuffle.disabled = true; 
            cooldownTimer = setInterval(() => {
                btnShuffle.innerText = `Chờ tĩnh tâm (${timeLeft}s)`;
                timeLeft--;
                if (timeLeft < 0) {
                    clearInterval(cooldownTimer);
                    btnShuffle.innerText = "Xào Bài";
                    btnShuffle.disabled = false; 
                    statusMsg.innerText = "✨ Năng lượng đã phục hồi. Bạn có thể đặt câu hỏi mới!✨";
                }
            }, 1000);
        }

        async function getFullTarotReading() {
            if (isProcessing) return;
            
            const rawKeys = document.getElementById("api-key").value.trim();
            const apiKeyArray = rawKeys.split(",").map(key => key.trim()).filter(key => key.length > 0);
            const question = document.getElementById("user-question").value.trim() || "Vũ trụ muốn gửi gắm thông điệp gì cho mình hôm nay?";
            const spreadMode = spreadSelect.value;
            
            readingBox.style.display = "block";

            if (apiKeyArray.length === 0) {
                readingBox.innerHTML = "✨ Vũ trụ cần một chiếc chìa khóa để mở cửa. Bạn giúp Pháp sư dán vào ô bên trên nhé! 🗝️";
                return;
            }

            isProcessing = true;
            btnShuffle.disabled = true; 

            if (currentKeyIndex >= apiKeyArray.length) {
                currentKeyIndex = 0;
            }

            const currentApiKey = apiKeyArray[currentKeyIndex];
            readingBox.innerHTML = `🔮 Trải bài đã sẵn sàng! Thông điệp đang được gửi đến bạn... 💫`;

            // DỰA VÀO INTENT ĐỂ CẤU HÌNH PROMPT CHO AI HIỂU SÂU SẮC Ý ĐỊNH NGƯỜI XEM
            let spreadContext = "";
            let roleContext = "Bạn là một Tarot và Lenormand reader hiểu biết rộng. Hãy chia sẻ thẳng thắn vấn đề";

            if (spreadMode === "intent_what") {
                spreadContext = `người xem đang cần một câu trả lời nhanh gọn dạng WHAT hoặc YES/NO. Lá bài bốc được là 1 lá Tarot: ${drawnCardsList[0].name}. Hãy tập trung giải quyết thẳng thắn, ngắn gọn, trả lời được có, không, hoặc chưa rõ và giải thích lá bài, giải thích vì sao họ đang hỏi.`;
            } else if (spreadMode === "intent_why") {
                spreadContext = `người xem đang muốn đào sâu nguyên nhân (WHY) và cách thức diễn biến (HOW). Trải bài gồm 3 lá Tarot đại diện cho Quá khứ, Hiện tại và Tương lai phát triển xu hướng: Lá 1: ${drawnCardsList[0].name}, Lá 2: ${drawnCardsList[1].name}, Lá 3: ${drawnCardsList[2].name}. Hãy phân tích sâu sắc tâm lý học, nhân quả vấn đề và xu hướng sắp tới.`;
            } else if (spreadMode === "intent_when") {
                roleContext = "Bạn là một bậc thầy đoán điềm giải sự kiện thông qua bài cổ điển Pháp Lenormand, cực kỳ nhạy bén, thực tế và chính xác.";
                spreadContext = `người xem quan tâm mạnh mẽ đến câu hỏi khi nào (WHEN), cái gì cụ thể (WHAT) hoặc ai dự phần (WHO). Bộ bài được rút ra là chuỗi 3 lá bài sự kiện Lenormand: ${drawnCardsList[0].name}, ${drawnCardsList[1].name}, và ${drawnCardsList[2].name}. Hãy xâu chuỗi chúng lại như một câu nói hoàn chỉnh, chỉ ra con người thực tế, hành động cụ thể hoặc thời điểm có thể xảy ra trong đời thực. Không nói triết lý hay tâm lý chung chung.`;
            } else if (spreadMode === "intent_all") {
                spreadContext = `người xem muốn có cái nhìn TOÀN DIỆN nhất cả về gốc rễ ẩn sâu lẫn sự việc hiển hiện bên ngoài. Quẻ bài kết hợp đặc biệt gồm:
                - 1 Lá Tarot làm Tâm (Giải mã động cơ nội tâm, năng lượng bản chất tại sao lại thế): ${drawnCardsList[0].name}.
                - 2 Lá Lenormand làm Cánh (Chỉ đích danh sự kiện đời thực, con người hoặc hành động cụ thể sẽ diễn ra xoay quanh năng lượng đó): ${drawnCardsList[1].name} và ${drawnCardsList[2].name}.
                Hãy đan cài hài hòa giữa hai thế giới: tinh thần (Tarot) và thực tế (Lenormand) để tạo nên bài luận quẻ có chiều sâu và tính ứng dụng cao nhất cho họ.`;
            }

            const promptText = `${roleContext} Người dùng đặt câu hỏi: "${question}". Trong quẻ này, ${spreadContext} Hãy viết bài luận giải bằng ngôn ngữ đặt câu hỏi, phân tách các phần rõ ràng bằng tiêu đề in đậm, ngôn từ chữa lành và đưa ra lời khuyên thiết thực. Hãy xưng hô là "mình" và gọi người dùng là "bạn". Tuyệt đối không nhắc đến các từ kỹ thuật lập trình.`;

            const apiUrl = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${currentApiKey}`;

            try {
                const response = await fetch(apiUrl, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: promptText }] }] })
                });
                
                const data = await response.json();
                
                if (data.error) {
                    const isQuotaError = data.error.code === 429 || data.error.status === "RESOURCE_EXHAUSTED" || (data.error.message && data.error.message.toLowerCase().includes("quota"));
                    if (isQuotaError) {
                        currentKeyIndex++; 
                        if (currentKeyIndex < apiKeyArray.length) {
                            isProcessing = false; 
                            getFullTarotReading(); 
                            return; 
                        } else {
                            readingBox.innerHTML = `🌙 Các vì sao đang nghỉ ngơi một chút! Năng lượng vũ trụ đang nạp lại, bạn đợi khoảng 1 phút rồi thử bốc lại nhé! 💖`;
                            currentKeyIndex = 0; 
                        }
                    } else {
                        readingBox.innerHTML = `🌠 Tín hiệu từ vũ trụ đang bị chập chờn! Bạn thử xào bài và bốc lại giúp Pháp sư nhé! ✨`;
                    }
                } else {
                    let aiResponse = data.candidates[0].content.parts[0].text;
                    aiResponse = aiResponse.replace(/\*\*(.*?)\*\?/g, '<b>$1</b>'); 
                    aiResponse = aiResponse.replace(/\*\*(.*?)\*\*/g, '<b>$1</b>'); 
                    aiResponse = aiResponse.replace(/\n/g, '<br>'); 
                    readingBox.innerHTML = `✨ <b>THÔNG ĐIỆP TỪ VŨ TRỤ:</b><br><br>${aiResponse}`;
                    currentKeyIndex = (currentKeyIndex + 1) % apiKeyArray.length; 
                }
            } catch (error) {
                readingBox.innerHTML = "📡 Trạm thu phát sóng tâm linh báo rớt mạng mất rồi! Bạn kiểm tra lại Wi-Fi hoặc 4G rồi thử lại nha! 🧚‍♀️";
            } finally {
                isProcessing = false;
                startCooldown(15); 
            }
        }

        function shuffleDeck() {
            if (isProcessing || btnShuffle.disabled) return;

            currentTarotDeck = [...tarotDeck]; 
            for (let i = currentTarotDeck.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [currentTarotDeck[i], currentTarotDeck[j]] = [currentTarotDeck[j], currentTarotDeck[i]]; 
            }

            currentLenormandDeck = [...lenormandDeck];
            for (let i = currentLenormandDeck.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [currentLenormandDeck[i], currentLenormandDeck[j]] = [currentLenormandDeck[j], currentLenormandDeck[i]]; 
            }
            
            statusMsg.innerText = "✨ Đang kết nối dòng chảy năng lượng... Hãy thả lỏng tâm trí nhé! ✨";
            board.innerHTML = ""; 
            readingBox.style.display = "none";
            drawnCardsList = []; 
            flippedCount = 0;    
            btnDraw.disabled = false; 
            
            setTimeout(() => {
                statusMsg.innerText = "Năng lượng đã được gửi tới vũ trụ. Hãy hít một hơi thật sâu và ấn Bốc Bài!";
            }, 1000);
        }

        function drawCards() {
            board.innerHTML = ""; 
            readingBox.style.display = "none";
            drawnCardsList = [];
            flippedCount = 0;
            
            const spreadMode = spreadSelect.value; 
            let setupPlan = []; 

            // ĐẰNG SAU HẬU TRƯỜNG: TỰ ĐỘNG PHÂN PHỐI BÀI THEO Ý ĐỊNH CỦA NGƯỜI XEM
            if (spreadMode === "intent_what") {
                setupPlan.push({ type: 'tarot', name: currentTarotDeck.pop() });
            } else if (spreadMode === "intent_why") {
                setupPlan.push({ type: 'tarot', name: currentTarotDeck.pop() });
                setupPlan.push({ type: 'tarot', name: currentTarotDeck.pop() });
                setupPlan.push({ type: 'tarot', name: currentTarotDeck.pop() });
            } else if (spreadMode === "intent_when") {
                setupPlan.push({ type: 'lenormand', name: currentLenormandDeck.pop() });
                setupPlan.push({ type: 'lenormand', name: currentLenormandDeck.pop() });
                setupPlan.push({ type: 'lenormand', name: currentLenormandDeck.pop() });
            } else if (spreadMode === "intent_all") {
                setupPlan.push({ type: 'tarot', name: currentTarotDeck.pop() });
                setupPlan.push({ type: 'lenormand', name: currentLenormandDeck.pop() });
                setupPlan.push({ type: 'lenormand', name: currentLenormandDeck.pop() });
            }

            drawnCardsList = setupPlan;
            totalCardsToDraw = setupPlan.length;
            
            statusMsg.innerText = `Hãy chọn lật mở ${totalCardsToDraw} chương định mệnh đang hiển hiện...`;
            btnDraw.disabled = true; 

            setupPlan.forEach((cardObj, index) => {
                const cardSlot = document.createElement("div");
                cardSlot.classList.add("card-slot");
                
                const isTarot = cardObj.type === 'tarot';
                const backImg = isTarot ? backTarot : backLenormand;
                const frontImg = isTarot 
                    ? `${pathTarot}${cardObj.name}.PNG` 
                    : `${pathLenormand}${cardObj.name}.png`;
                
                // Hiển thị nhãn tâm linh tinh tế thay cho tên bộ bài khô khan
                let labelText = "Thấu Thị";
                if (spreadMode === "intent_why") {
                    const mốc = ["Quá Khứ", "Hiện Tại", "Tương Lai"];
                    labelText = mốc[index];
                } else if (spreadMode === "intent_when") {
                    labelText = `Sự Kiện ${index + 1}`;
                } else if (spreadMode === "intent_all") {
                    labelText = isTarot ? "Nội Tâm" : `Thực Tế ${index}`;
                }

                cardSlot.innerHTML = `
                    <div class="card-label">${labelText}</div>
                    <div class="card-inner">
                        <div class="card-front">
                            <img src="${backImg}" alt="Mặt sau" onerror="this.src='${backTarot}'">
                        </div>
                        <div class="card-back">
                            <img src="${frontImg}" alt="${cardObj.name}" onerror="this.src='https://via.placeholder.com/150x260/fff/000?text=${cardObj.name}'">
                        </div>
                    </div>
                `;

                cardSlot.addEventListener("click", function() {
                    if (isProcessing) return;

                    if (!this.classList.contains("flipped")) {
                        this.classList.add("flipped");
                        flippedCount++; 
                        
                        if (flippedCount === totalCardsToDraw) {
                            statusMsg.innerText = "🔮 Cửa thông đạo đã mở. Đang đón nhận tín hiệu...";
                            getFullTarotReading(); 
                        } else {
                            statusMsg.innerText = `Lật tiếp đi bạn, còn ${totalCardsToDraw - flippedCount} lá nữa thôi!`;
                        }
                    }
                });

                board.appendChild(cardSlot);
            });
        }

        btnShuffle.addEventListener("click", shuffleDeck);
        btnDraw.addEventListener("click", drawCards);

        spreadSelect.addEventListener("change", () => {
            if (isProcessing) return; 
            btnDraw.disabled = true;
            board.innerHTML = "";
            readingBox.style.display = "none";
            statusMsg.innerText = "Bạn đã thay đổi ý niệm hỏi. Xin hãy xào bài lại nhé!";
        });
    </script>
</body>
</html>
