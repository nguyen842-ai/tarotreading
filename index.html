<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trạm kết nối Vũ Trụ - Tarot & Lenormand</title>
    <style>
        /* ================= CSS ================= */
* {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
    -webkit-tap-highlight-color: transparent;
}

body {
    background-color: #1a0b2e;
    color: #e5d3b3;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    text-align: center;
    padding: 16px;
    /* Tránh zoom khi focus input trên iOS */
    -webkit-text-size-adjust: 100%;
}

h1 {
    margin-bottom: 16px;
    font-size: clamp(1.5rem, 5vw, 2.5rem);
    text-shadow: 0 0 15px #c29d59;
    line-height: 1.3;
}

.controls {
    margin-bottom: 16px;
    background: rgba(0, 0, 0, 0.4);
    padding: 16px;
    border-radius: 12px;
    display: block;
    max-width: 800px;
    width: 100%;
    margin-left: auto;
    margin-right: auto;
    border: 1px solid #4a2b7d;
}

.ai-inputs {
    display: flex;
    flex-direction: column;
    gap: 12px;
    margin-bottom: 15px;
}

input[type="text"], input[type="password"] {
    padding: 14px 12px;
    /* font-size tối thiểu 16px để iOS không tự zoom khi focus */
    font-size: 16px;
    border-radius: 8px;
    background: #2a164d;
    color: white;
    border: 1px solid #c29d59;
    width: 100%;
    outline: none;
    /* Tắt appearance mặc định trên iOS */
    -webkit-appearance: none;
    appearance: none;
}

input::placeholder {
    color: #a78bfa;
    opacity: 0.7;
}

/* Hàng chứa select + nút, wrap gọn trên mobile */
.spread-row {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    align-items: center;
    justify-content: center;
}

.spread-row label {
    width: 100%;
    margin-bottom: 2px;
    font-size: 0.9rem;
    color: #c4b5fd;
}

select {
    padding: 12px 10px;
    font-size: 16px; /* tránh zoom iOS */
    border-radius: 8px;
    background: #2a164d;
    color: white;
    border: 1px solid #c29d59;
    cursor: pointer;
    outline: none;
    -webkit-appearance: none;
    appearance: none;
    flex: 1 1 200px;
    min-width: 0;
}

.btn-row {
    display: flex;
    gap: 8px;
    justify-content: center;
    margin-top: 10px;
    flex-wrap: wrap;
}

.mystic-btn {
    padding: 13px 22px;
    font-size: 1rem;
    font-weight: bold;
    color: #1a0b2e;
    background-color: #c29d59;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    transition: background-color 0.2s, box-shadow 0.2s, transform 0.1s;
    flex: 1 1 120px;
    min-width: 0;
    /* Vùng chạm tối thiểu 44px theo chuẩn Apple HIG */
    min-height: 44px;
    /* Loại bỏ delay 300ms click trên mobile */
    touch-action: manipulation;
}

.mystic-btn:active:not(:disabled) {
    transform: scale(0.97);
    background-color: #e5d3b3;
}

@media (hover: hover) {
    .mystic-btn:hover:not(:disabled) {
        background-color: #e5d3b3;
        box-shadow: 0 0 15px #c29d59;
    }
}

.mystic-btn:disabled {
    background-color: #555;
    color: #888;
    cursor: not-allowed;
    box-shadow: none;
}

#status-message {
    font-size: clamp(0.95rem, 3vw, 1.2rem);
    margin-bottom: 16px;
    font-style: italic;
    color: #c4b5fd;
    padding: 0 8px;
    line-height: 1.5;
}

/* --- BÀN BỐC BÀI & LÁ BÀI --- */
.tarot-board {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 20px;
    max-width: 1100px;
    margin: 40px auto 30px auto;
    padding: 0 4px;
}

.card-slot {
    perspective: 1000px;
    /* Co giãn tự nhiên theo màn hình, tối đa 150px */
    width: clamp(100px, 28vw, 150px);
    height: clamp(175px, 49vw, 260px);
    cursor: pointer;
    position: relative;
    /* Vùng chạm đủ rộng */
    touch-action: manipulation;
}

.card-label {
    position: absolute;
    top: -24px;
    left: 0;
    width: 100%;
    font-size: clamp(0.65rem, 2.2vw, 0.85rem);
    color: #c29d59;
    font-weight: bold;
    text-transform: uppercase;
    letter-spacing: 1px;
    text-shadow: 0 0 5px rgba(0,0,0,0.8);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
}

.card-inner {
    width: 100%;
    height: 100%;
    position: relative;
    transition: transform 0.7s cubic-bezier(0.4, 0.2, 0.2, 1);
    transform-style: preserve-3d;
}

.card-slot.flipped .card-inner {
    transform: rotateY(180deg);
}

.card-front, .card-back {
    width: 100%;
    height: 100%;
    position: absolute;
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden; /* Safari */
    border-radius: 10px;
    box-shadow: 0 6px 12px rgba(0,0,0,0.5);
    border: 2px solid #c29d59;
}

.card-front {
    background-color: #2a164d;
}

.card-front img, .card-back img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    border-radius: 8px;
    /* Tắt callout menu khi nhấn giữ ảnh trên iOS */
    -webkit-touch-callout: none;
    pointer-events: none;
}

.card-back {
    transform: rotateY(180deg);
    background-color: #fff;
}

/* HIỆU ỨNG LÁ BÀI NGƯỢC */
.card-slot .card-inner .card-back img.card-reversed {
    transform: rotate(180deg);
}

/* --- LOADING DOTS --- */
.loading-dots::after {
    content: '';
    animation: dots 1.4s infinite;
}
@keyframes dots {
    0%   { content: ''; }
    25%  { content: '.'; }
    50%  { content: '..'; }
    75%  { content: '...'; }
}

/* --- KẾT QUẢ LUẬN QUẺ --- */
#reading-result {
    background: rgba(42, 22, 77, 0.95);
    border: 1px solid #c29d59;
    padding: 20px 16px;
    border-radius: 12px;
    max-width: 800px;
    margin: 0 auto 40px auto;
    text-align: left;
    line-height: 1.85;
    font-size: clamp(0.95rem, 3vw, 1.1rem);
    display: none;
    box-shadow: 0 0 30px rgba(194, 157, 89, 0.2);
    /* Scroll mượt khi nội dung dài trên iOS */
    -webkit-overflow-scrolling: touch;
}

/* NÚT COPY */
.copy-btn-wrap {
    display: flex;
    justify-content: flex-end;
    margin-top: 18px;
    padding-top: 14px;
    border-top: 1px solid rgba(194, 157, 89, 0.3);
}

#btn-copy {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 10px 18px;
    font-size: 0.9rem;
    font-weight: bold;
    color: #1a0b2e;
    background-color: #c29d59;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    transition: background-color 0.2s, transform 0.1s;
    touch-action: manipulation;
    min-height: 44px;
}

#btn-copy:active {
    transform: scale(0.96);
    background-color: #e5d3b3;
}

@media (hover: hover) {
    #btn-copy:hover {
        background-color: #e5d3b3;
        box-shadow: 0 0 10px #c29d59;
    }
}

#btn-copy.copied {
    background-color: #4ade80;
    color: #1a0b2e;
}

/* --- RESPONSIVE CHO MÀN HÌNH NHỎ --- */
@media (max-width: 400px) {
    body { padding: 10px 8px; }
    .controls { padding: 12px 10px; }
    .tarot-board { gap: 14px; }
    #reading-result { padding: 16px 12px; }
}
    </style>
</head>
<body>
    <div class="container">
        <h1>🔮 Trạm Lắng Nghe Vũ Trụ 🔮</h1>
        
        <div class="controls">
            <div class="ai-inputs">
                <input type="password" id="api-key" placeholder="🗝️ Nhập chìa khóa để mở cổng liên kết 🗝️.">
                <input type="text" id="user-question" placeholder="💭 Bạn đang băn khoăn điều gì lúc này?">
            </div>

            <div class="spread-row">
                <label for="spread-type">Bạn muốn vũ trụ làm rõ điều gì?</label>
                <select id="spread-type">
                    <option value="intent_all">TOÀN DIỆN (Năng lượng cốt lõi & Sự kiện đời thực)</option>
                    <option value="intent_what">WHAT / YES-NO (Lời khuyên hành động nhanh & Định hướng)</option>
                    <option value="intent_why">WHY / HOW (Gốc rễ tâm lý, Nhân quả & Xu hướng sắp tới)</option>
                    <option value="intent_when">WHEN / WHO (Sự kiện cụ thể, Thời gian & Con người thực tế)</option>
                </select>
            </div>
            <div class="btn-row">
                <button id="btn-shuffle" class="mystic-btn">🔀 Xào Bài</button>
                <button id="btn-draw" class="mystic-btn" disabled>✨ Bốc Bài</button>
            </div>
        </div>

        <div id="status-message">✨ Đặt câu hỏi và ấn "Xào Bài"... ✨</div>

        <div id="tarot-board" class="tarot-board"></div>
        <div id="reading-result">
            <div id="reading-content"></div>
            <div class="copy-btn-wrap">
                <button id="btn-copy">
                    <span id="copy-icon">📋</span>
                    <span id="copy-label">Sao chép</span>
                </button>
            </div>
        </div>
    </div>

    <script>
        // HỆ THỐNG BÀI
        const tarotDeck = [
            "0thefool", "1themagician", "2thehighpriestess", "3theempress", "4theemperor", 
            "5thehierophant", "6thelovers", "7thechariot", "8strength", "9thehermit", 
            "10wheeloffortune", "11justice", "12thehangedman", "13death", "14temperance", 
            "15thedevil", "16thetower", "17thestar", "18themoon", "19thesun", "20judgement", "21theworld",
            "1cup", "2cup", "3cup", "4cup", "5cup", "6cup", "7cup", "8cup", "9cup", "10cup", "pagecup", "knightcup", "queencup", "kingcup",
            "1wand", "2wand", "3wand", "4wand", "5wand", "6wand", "7wand", "8wand", "9wand", "10wand", "pagewand", "knightwand", "queenwand", "kingwand",
            "1sword", "2sword", "3sword", "4sword", "5sword", "6sword", "7sword", "8sword", "9sword", "10sword", "pagesword", "knightsword", "queensword", "kingsword",
            "1pen", "2pen", "3pen", "4pen", "5pen", "6pen", "7pen", "8pen", "9pen", "10pen", "pagepen", "knightpen", "queenpen", "kingpen"
        ];

        const lenormandDeck = [
            "1rider", "2clover", "3ship", "4house", "5tree", "6clouds", "7snake", "8coffin",
            "9bouquet", "10scythe", "11whip", "12birds", "13child", "14fox", "15bear", "16stars",
            "17stork", "18dog", "19tower", "20garden", "21mountain", "22crossroads", "23mice", "24heart",
            "25ring", "26book", "27letter", "28man", "29woman", "30lilies", "31sun", "32moon",
            "33key", "34fish", "35anchor", "36cross"
        ];

        // ĐƯỜNG DẪN ẢNH ĐỘC LẬP
        const pathTarot = "assets/images/new_folder/";
        const pathLenormand = "assets/images/lenormand/";
        
        const backTarot = pathTarot + "card-back.PNG";
        const backLenormand = pathLenormand + "card-back-L.jpg"; 

        let currentTarotDeck = [];
        let currentLenormandDeck = [];
        
        let drawnCardsList = []; 
        let totalCardsToDraw = 0;
        let flippedCount = 0;    
        
        // HỆ THỐNG QUẢN LÝ TẢI TRỌNG (API & COOLDOWN)
        let currentKeyIndex = 0; 
        let isProcessing = false; 
        let cooldownTimer = null; 

        // TỈ LỆ BÀI NGƯỢC (Áp dụng cho Tarot)
        const REVERSAL_THRESHOLD = 30; // 30%

        const btnShuffle = document.getElementById("btn-shuffle");
        const btnDraw = document.getElementById("btn-draw");
        const board = document.getElementById("tarot-board");
        const statusMsg = document.getElementById("status-message");
        const spreadSelect = document.getElementById("spread-type");
        const readingBox = document.getElementById("reading-result");
        const readingContent = document.getElementById("reading-content");
        const btnCopy = document.getElementById("btn-copy");

        // NÚT COPY KẾT QUẢ
        btnCopy.addEventListener("click", () => {
            const text = readingContent.innerText || readingContent.textContent;
            if (!text) return;
            navigator.clipboard.writeText(text).then(() => {
                btnCopy.classList.add("copied");
                document.getElementById("copy-icon").textContent = "✅";
                document.getElementById("copy-label").textContent = "Đã sao chép!";
                setTimeout(() => {
                    btnCopy.classList.remove("copied");
                    document.getElementById("copy-icon").textContent = "📋";
                    document.getElementById("copy-label").textContent = "Sao chép";
                }, 2500);
            }).catch(() => {
                // Fallback cho trình duyệt cũ
                const range = document.createRange();
                range.selectNodeContents(readingContent);
                const sel = window.getSelection();
                sel.removeAllRanges();
                sel.addRange(range);
                document.execCommand("copy");
                sel.removeAllRanges();
                document.getElementById("copy-icon").textContent = "✅";
                document.getElementById("copy-label").textContent = "Đã sao chép!";
                setTimeout(() => {
                    document.getElementById("copy-icon").textContent = "📋";
                    document.getElementById("copy-label").textContent = "Sao chép";
                }, 2500);
            });
        });

        // ÉP CHỜ TĨNH TÂM 15 GIÂY (CHỐNG RATE LIMIT)
        function startCooldown(seconds) {
            let timeLeft = seconds;
            btnShuffle.disabled = true; 
            cooldownTimer = setInterval(() => {
                btnShuffle.textContent = `⏳ Tĩnh tâm (${timeLeft}s)`;
                timeLeft--;
                if (timeLeft < 0) {
                    clearInterval(cooldownTimer);
                    btnShuffle.textContent = "🔀 Xào Bài";
                    btnShuffle.disabled = false; 
                    statusMsg.innerText = "✨ Năng lượng đã phục hồi. Bạn có thể đặt câu hỏi mới!";
                }
            }, 1000);
        }

        // HÀM GỌI AI LUẬN QUẺ (TÍCH HỢP TƯ DUY MASTER READER)
        async function getFullTarotReading() {
            if (isProcessing) return;
            
            const rawKeys = document.getElementById("api-key").value.trim();
            const apiKeyArray = rawKeys.split(",").map(key => key.trim()).filter(key => key.length > 0);
            const question = document.getElementById("user-question").value.trim() || "Vũ trụ muốn gửi gắm thông điệp gì cho mình hôm nay?";
            const spreadMode = spreadSelect.value;
            
            readingBox.style.display = "block";

            if (apiKeyArray.length === 0) {
                readingContent.innerHTML = "✨ Vũ trụ cần một chiếc chìa khóa để mở cửa! 🗝️";
                return;
            }

            isProcessing = true;
            btnShuffle.disabled = true; 

            if (currentKeyIndex >= apiKeyArray.length) {
                currentKeyIndex = 0;
            }

            const currentApiKey = apiKeyArray[currentKeyIndex];
            readingContent.innerHTML = `🔮 <span class="loading-dots">Thông điệp đang được gửi đến bạn</span>`;

            // XÂY DỰNG NHÂN VẬT & TƯ DUY LUẬN GIẢI CHO AI
            let spreadContext = "";
            let roleContext = "Bạn là một Reader Tarot & Lenormand thực tế và có khả năng liên kết bức tranh tổng quan tốt. ";
            roleContext += "Bạn hiểu ý nghĩa của bài Tarot ngược (sự cản trở, bài học chưa học, hoặc năng lượng hướng nội). Hãy giải nghĩa cả 2 chiều. ";
            roleContext += "Thêm vào đó, với Tarot, BẠN LÀ MỘT CHUYÊN GIA ĐỌC TỔNG QUAN (MACRO-READING). Bạn luôn nhìn vào bức tranh lớn trước tiên: Sự xuất hiện của Ẩn Chính (định mệnh), sự lặp lại của các con số, và sự áp đảo của các nguyên tố (Cốc, Gậy, Kiếm, Tiền). ";

            const getReversedStr = (card) => (card.type === 'tarot' && card.reversed) ? " (ngược)" : "";

            if (spreadMode === "intent_what") {
                const cardReversedStr = getReversedStr(drawnCardsList[0]);
                spreadContext = `người xem đang cần một câu trả lời nhanh gọn dạng WHAT hoặc YES/NO. Lá bài bốc được là 1 lá Tarot: ${drawnCardsList[0].name}${cardReversedStr}. Hãy tập trung giải quyết thẳng thắn, ngắn gọn nhưng định hướng tốt cho họ.`;
                
            } else if (spreadMode === "intent_why") {
                const r1 = getReversedStr(drawnCardsList[0]);
                const r2 = getReversedStr(drawnCardsList[1]);
                const r3 = getReversedStr(drawnCardsList[2]);
                spreadContext = `người xem đang muốn đào sâu nguyên nhân (WHY) và cách thức diễn biến (HOW). Trải bài gồm 3 lá Tarot: 
                Lá 1 (Quá khứ): ${drawnCardsList[0].name}${r1}, 
                Lá 2 (Hiện tại): ${drawnCardsList[1].name}${r2}, 
                Lá 3 (Tương lai xu hướng): ${drawnCardsList[2].name}${r3}. 
                
                YÊU CẦU BẮT BUỘC: 
                1. (ĐỌC TỔNG QUAN - BỨC TRANH LỚN): TRƯỚC KHI giải thích từng mốc thời gian, HÃY quét qua 3 lá bài này và dành một đoạn ngắn để chỉ ra các điểm nhấn tổng quan: Có lá Ẩn chính nào xuất hiện không? Có sự lặp lại của các con số hay sự áp đảo của một nguyên tố nào không? Nó nói lên năng lượng chung gì?
                2. (LUẬN GIẢI CHI TIẾT): Sau phần tổng quan, hãy phân tích sâu sắc tâm lý học, nhân quả vấn đề theo 3 mốc thời gian.`;
                
            } else if (spreadMode === "intent_when") {
                roleContext = "Bạn là một bậc thầy bài Lenormand cổ điển Pháp. Bạn KHÔNG BAO GIỜ đọc rời rạc từng lá. Khả năng của bạn là KIẾN TẠO MỘT CÂU CHUYỆN LIỀN MẠCH bằng cách tổ hợp, ghép nghĩa các lá bài lại với nhau.";
                
                spreadContext = `người xem hỏi về sự kiện thực tế (WHEN, WHAT, WHO). 3 lá Lenormand được rút theo thứ tự: ${drawnCardsList[0].name}, ${drawnCardsList[1].name}, và ${drawnCardsList[2].name}. 
                YÊU CẦU BẮT BUỘC: Tuyệt đối không giải thích riêng lẻ từng lá. Hãy áp dụng quy tắc cốt lõi của Lenormand: coi lá ở giữa (${drawnCardsList[1].name}) làm trọng tâm sự kiện, hai lá hai bên làm tính từ bổ nghĩa. Hãy hòa trộn, ghép nghĩa 3 lá này lại thành MỘT sự kiện/hành động thực tế, cụ thể sắp xảy ra trong đời thực.`;
                
            } else if (spreadMode === "intent_all") {
                const rootReversedStr = getReversedStr(drawnCardsList[0]);
                spreadContext = `người xem muốn có cái nhìn TOÀN DIỆN nhất. Quẻ bài kết hợp đặc biệt gồm:
                - Gốc rễ nội tâm (1 Lá Tarot): ${drawnCardsList[0].name}${rootReversedStr}. 
                - Sự kiện thực tế (2 Lá Lenormand): ${drawnCardsList[1].name} và ${drawnCardsList[2].name}.
                YÊU CẦU BẮT BUỘC: 
                1. Hãy phân tích bản chất năng lượng của từng lá Tarot đơn lẻ, sau đó kết hợp lại (chú ý thuộc tính nguyên tố hoặc Ẩn chính, sự lặp lại của các con số trong bộ ẩn phụ).
                2. Với 2 lá Lenormand, tuyệt đối không giải nghĩa rời rạc. Hãy ghép nghĩa của chúng lại (Lá 1 + Lá 2) để tạo ra MỘT sự kiện/hành động đời thực duy nhất. 
                3. Đan cài sự kiện Lenormand này với năng lượng gốc của lá Tarot để tạo thành bài luận quẻ liền mạch.`;
            }

            const promptText = `${roleContext} Người dùng đặt câu hỏi: "${question}". Trong quẻ này, ${spreadContext} Hãy viết bài luận giải bằng tiếng việt, phân tách các phần rõ ràng bằng tiêu đề in đậm, ngôn từ thực tế và đưa ra lời khuyên bao gồm 20% nội tâm, 80% lời khuyên hành động thực tế ( Không được nhắc đến tỷ lệ % này trong phần trả lời). Hãy xưng hô là "mình" và gọi người dùng là "bạn". Tuyệt đối không nhắc đến các từ kỹ thuật lập trình.`;

            const apiUrl = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${currentApiKey}`;

            try {
                const response = await fetch(apiUrl, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: promptText }] }] })
                });
                
                const data = await response.json();
                
                if (data.error) {
                    const isQuotaError = data.error.code === 429 || data.error.status === "RESOURCE_EXHAUSTED" || (data.error.message && data.error.message.toLowerCase().includes("quota"));
                    if (isQuotaError) {
                        currentKeyIndex++; 
                        if (currentKeyIndex < apiKeyArray.length) {
                            isProcessing = false; 
                            getFullTarotReading(); // Xoay tua Key dự phòng
                            return; 
                        } else {
                            readingContent.innerHTML = `🌙 Các vì sao đang nghỉ ngơi một chút! Năng lượng vũ trụ đang nạp lại, bạn đợi khoảng 1 phút rồi thử bốc lại nhé! 💖`;
                            currentKeyIndex = 0; 
                        }
                    } else {
                        readingContent.innerHTML = `🌠 Tín hiệu từ vũ trụ đang bị chập chờn! Bạn thử xào bài và bốc lại giúp Pháp sư nhé! ✨`;
                    }
                } else {
                    let aiResponse = data.candidates[0].content.parts[0].text;
                    aiResponse = aiResponse.replace(/\*\*(.*?)\*\*/g, '<b>$1</b>'); 
                    aiResponse = aiResponse.replace(/\n/g, '<br>'); 
                    readingContent.innerHTML = `✨ <b>THÔNG ĐIỆP TỪ VŨ TRỤ:</b><br><br>${aiResponse}`;
                    currentKeyIndex = (currentKeyIndex + 1) % apiKeyArray.length; 
                }
            } catch (error) {
                readingContent.innerHTML = "📡 Trạm thu phát sóng tâm linh báo rớt mạng mất rồi! Bạn kiểm tra đường truyền mạng rồi thử lại nha! 🧚‍♀️";
            } finally {
                isProcessing = false;
                startCooldown(15);
                // Cuộn mượt xuống kết quả trên mobile
                readingBox.scrollIntoView({ behavior: 'smooth', block: 'start' });
            }
        }

        // XÀO BÀI (VỚI HOẠT ẢNH VISUAL DECK)
        function shuffleDeck() {
            if (isProcessing || btnShuffle.disabled) return;

            document.body.classList.add("shuffling");
            board.innerHTML = ""; 
            readingBox.style.display = "none";
            btnDraw.disabled = true;

            currentTarotDeck = [...tarotDeck]; 
            for (let i = currentTarotDeck.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [currentTarotDeck[i], currentTarotDeck[j]] = [currentTarotDeck[j], currentTarotDeck[i]]; 
            }

            currentLenormandDeck = [...lenormandDeck];
            for (let i = currentLenormandDeck.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [currentLenormandDeck[i], currentLenormandDeck[j]] = [currentLenormandDeck[j], currentLenormandDeck[i]]; 
            }
            
            statusMsg.innerText = "✨ Đang kết nối dòng chảy năng lượng... Hãy thả lỏng tâm trí nhé! ✨";
            drawnCardsList = []; 
            flippedCount = 0;    
            
            setTimeout(() => {
                document.body.classList.remove("shuffling"); 
                btnDraw.disabled = false; 
                statusMsg.innerText = "Năng lượng đã đồng điệu. Hãy hít một hơi thật sâu và ấn Bốc Bài!";
            }, 1200);
        }

        // BỐC BÀI & PHÂN PHỐI BÀI NGƯỢC
        function drawCards() {
            board.innerHTML = ""; 
            readingBox.style.display = "none";
            drawnCardsList = [];
            flippedCount = 0;
            
            const spreadMode = spreadSelect.value; 
            let setupPlan = []; 

            // Hàm hỗ trợ rút bài
            const tarotPop = () => {
                const name = currentTarotDeck.pop();
                const isReversed = (Math.random() * 100) < REVERSAL_THRESHOLD;
                return { type: 'tarot', name: name, reversed: isReversed };
            }
            const lenormandPop = () => ({ type: 'lenormand', name: currentLenormandDeck.pop(), reversed: false });

            // Sắp xếp bài theo Intent
            if (spreadMode === "intent_what") {
                setupPlan.push(tarotPop());
            } else if (spreadMode === "intent_why") {
                setupPlan.push(tarotPop());
                setupPlan.push(tarotPop());
                setupPlan.push(tarotPop());
            } else if (spreadMode === "intent_when") {
                setupPlan.push(lenormandPop());
                setupPlan.push(lenormandPop());
                setupPlan.push(lenormandPop());
            } else if (spreadMode === "intent_all") {
                setupPlan.push(tarotPop());
                setupPlan.push(lenormandPop());
                setupPlan.push(lenormandPop());
            }

            drawnCardsList = setupPlan;
            totalCardsToDraw = setupPlan.length;
            
            statusMsg.innerText = `Hãy chọn lật mở ${totalCardsToDraw} chương định mệnh đang hiển hiện...`;
            btnDraw.disabled = true; 

            // Render lá bài ra DOM
            setupPlan.forEach((cardObj, index) => {
                const cardSlot = document.createElement("div");
                cardSlot.classList.add("card-slot");
                
                const isTarot = cardObj.type === 'tarot';
                const backImg = isTarot ? backTarot : backLenormand;
                const frontImg = isTarot ? `${pathTarot}${cardObj.name}.PNG` : `${pathLenormand}${cardObj.name}.PNG`;
                
                let labelText = "Thấu Thị";
                if (spreadMode === "intent_why") {
                    const mốc = ["Quá Khứ", "Hiện Tại", "Tương Lai"];
                    labelText = mốc[index];
                } else if (spreadMode === "intent_when") {
                    labelText = `Sự Kiện ${index + 1}`;
                } else if (spreadMode === "intent_all") {
                    labelText = isTarot ? "Gốc Rễ Nội Tâm" : `Sự Kiện Thực Tế ${index}`;
                }

                cardSlot.innerHTML = `
                    <div class="card-label">${labelText}</div>
                    <div class="card-inner">
                        <div class="card-front">
                            <img src="${backImg}" alt="Mặt sau" onerror="this.src='${backTarot}'">
                        </div>
                        <div class="card-back">
                            <img src="${frontImg}" alt="${cardObj.name}" 
                                 class="${cardObj.reversed ? 'card-reversed' : ''}" 
                                 onerror="this.src='https://via.placeholder.com/150x260/fff/000?text=${cardObj.name}'">
                        </div>
                    </div>
                `;

                cardSlot.addEventListener("click", function() {
                    if (isProcessing) return;

                    if (!this.classList.contains("flipped")) {
                        this.classList.add("flipped");
                        flippedCount++; 
                        
                        if (flippedCount === totalCardsToDraw) {
                            statusMsg.innerText = "🔮 Vũ trụ đang gửi tín hiệu xuống cho bạn nè...🔮";
                            getFullTarotReading(); 
                        } else {
                            statusMsg.innerText = `Lật tiếp đi bạn, còn ${totalCardsToDraw - flippedCount} lá nữa thôi!`;
                        }
                    }
                });

                board.appendChild(cardSlot);
            });
        }

        btnShuffle.addEventListener("click", shuffleDeck);
        btnDraw.addEventListener("click", drawCards);

        spreadSelect.addEventListener("change", () => {
            if (isProcessing) return; 
            btnDraw.disabled = true;
            board.innerHTML = "";
            readingBox.style.display = "none";
            document.body.classList.add("shuffling");
            setTimeout(() => document.body.classList.remove("shuffling"), 1200);
            statusMsg.innerText = "Bạn đã thay đổi câu hỏi. Xin hãy xào bài lại nhé!";
        });
    </script>
</body>
</html>
