<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trải Bài Tarot Online</title>
    <style>
        /* ================= CSS (TRANG TRÍ GIAO DIỆN) ================= */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #1a0b2e;
            color: #e5d3b3;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
            padding: 20px;
        }

        h1 {
            margin-bottom: 20px;
            font-size: 2.5rem;
            text-shadow: 0 0 10px #c29d59;
        }

        .controls {
            margin-bottom: 20px;
            background: rgba(0, 0, 0, 0.4);
            padding: 20px;
            border-radius: 10px;
            display: inline-block;
            max-width: 800px;
            width: 100%;
        }

        /* Khung nhập liệu cho AI */
        .ai-inputs {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 15px;
        }

        input[type="text"], input[type="password"] {
            padding: 10px;
            font-size: 1rem;
            border-radius: 5px;
            background: #2a164d;
            color: white;
            border: 1px solid #c29d59;
            width: 100%;
        }

        select {
            padding: 10px;
            font-size: 1rem;
            border-radius: 5px;
            background: #2a164d;
            color: white;
            border: 1px solid #c29d59;
            margin-right: 10px;
            cursor: pointer;
        }

        .mystic-btn {
            padding: 10px 20px;
            font-size: 1rem;
            font-weight: bold;
            color: #1a0b2e;
            background-color: #c29d59;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: 0.3s;
            margin: 5px;
        }

        .mystic-btn:hover:not(:disabled) {
            background-color: #e5d3b3;
            box-shadow: 0 0 15px #c29d59;
        }

        .mystic-btn:disabled {
            background-color: #555;
            color: #888;
            cursor: not-allowed;
        }

        #status-message {
            font-size: 1.2rem;
            margin-bottom: 20px;
            font-style: italic;
            color: #a78bfa;
        }

        /* Khu vực hiển thị lá bài (Size nhỏ) */
        .tarot-board {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            max-width: 1000px;
            margin: 0 auto 30px auto;
        }

        .card-slot {
            perspective: 1000px;
            width: 150px;
            height: 260px;
            cursor: pointer;
        }

        .card-inner {
            width: 100%;
            height: 100%;
            position: relative;
            transition: transform 0.6s;
            transform-style: preserve-3d;
        }

        .card-slot.flipped .card-inner {
            transform: rotateY(180deg);
        }

        .card-front, .card-back {
            width: 100%;
            height: 100%;
            position: absolute;
            backface-visibility: hidden;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.5);
            border: 2px solid #c29d59;
        }

        .card-front {
            background-color: #2a164d; 
        }

        .card-front img, .card-back img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 8px;
        }

        .card-back {
            transform: rotateY(180deg);
            background-color: #fff;
        }

        /* Khu vực hiển thị lời giải */
        #reading-result {
            background: rgba(42, 22, 77, 0.8);
            border: 1px solid #c29d59;
            padding: 20px;
            border-radius: 10px;
            max-width: 800px;
            margin: 0 auto;
            text-align: left;
            line-height: 1.6;
            font-size: 1.1rem;
            display: none; /* Ẩn đi khi chưa có nội dung */
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔮 FREE READING TAROT 🔮</h1>
        
        <div class="controls">
            <div class="ai-inputs">
                <input type="password" id="api-key" placeholder="Nhập đoạn mã để kết nốt với vũ trụ nhé :)...">
                <input type="text" id="user-question" placeholder="Bạn đang băn khoăn điều gì? (VD: Tình duyên tháng này ra sao?)">
            </div>

            <div>
                <label for="spread-type">Chọn kiểu trải bài:</label>
                <select id="spread-type">
                    <option value="1">1 Lá (Yes/No - Thông điệp ngày)</option>
                    <option value="3">3 Lá (Quá khứ - Hiện tại - Tương lai)</option>
                    <option value="5">5 Lá (Chữ thập - Mở rộng vấn đề)</option>
                </select>
                
                <button id="btn-shuffle" class="mystic-btn">Xào Bài</button>
                <button id="btn-draw" class="mystic-btn" disabled>Bốc Bài</button>
            </div>
        </div>

        <div id="status-message">Hãy nhập Key, đặt câu hỏi và ấn "Xào Bài"...</div>

        <div id="tarot-board" class="tarot-board"></div>

        <div id="reading-result"></div>
    </div>

    <script>
        const tarotDeck = [
            "0thefool", "1themagician", "2thehighpriestess", "3theempress", "4theemperor", 
            "5thehierophant", "6thelovers", "7thechariot", "8strength", "9thehermit", 
            "10wheeloffortune", "11justice", "12thehangedman", "13death", "14temperance", 
            "15thedevil", "16thetower", "17thestar", "18themoon", "19thesun", "20judgement", "21theworld",
            "1cup", "2cup", "3cup", "4cup", "5cup", "6cup", "7cup", "8cup", "9cup", "10cup", "pagecup", "knightcup", "queencup", "kingcup",
            "1wand", "2wand", "3wand", "4wand", "5wand", "6wand", "7wand", "8wand", "9wand", "10wand", "pagewand", "knightwand", "queenwand", "kingwand",
            "1sword", "2sword", "3sword", "4sword", "5sword", "6sword", "7sword", "8sword", "9sword", "10sword", "pagesword", "knightsword", "queensword", "kingsword",
            "1pen", "2pen", "3pen", "4pen", "5pen", "6pen", "7pen", "8pen", "9pen", "10pen", "pagepen", "knightpen", "queenpen", "kingpen"
        ];

        const folderPath = "assets/images/new_folder/";
        const cardBackImg = folderPath + "card-back.PNG"; 

        let currentDeck = []; 

        const btnShuffle = document.getElementById("btn-shuffle");
        const btnDraw = document.getElementById("btn-draw");
        const board = document.getElementById("tarot-board");
        const statusMsg = document.getElementById("status-message");
        const spreadSelect = document.getElementById("spread-type");
        const readingBox = document.getElementById("reading-result");

        // HÀM GỌI GEMINI API ĐỂ ĐỌC BÀI
        async function getTarotReading(cardName) {
            const apiKey = document.getElementById("api-key").value.trim();
            const question = document.getElementById("user-question").value.trim() || "Thông điệp chung cho tôi hôm nay là gì?";
            
            readingBox.style.display = "block";

            if (!apiKey) {
                readingBox.innerHTML = "⚠️ Vui lòng nhập API Key ở phía trên để Pháp sư có thể giải mã lá bài!";
                return;
            }

            readingBox.innerHTML = `⏳ Pháp sư đang kết nối với vũ trụ để giải mã lá bài <b>${cardName}</b>...`;

            // Prompt hướng dẫn AI đóng vai Reader
            const promptText = `Bạn là một Reader Tarot huyền bí, đồng cảm và thông thái. Người dùng vừa hỏi câu hỏi: "${question}" và bốc được lá bài có tên là "${cardName}". Hãy giải nghĩa lá bài này ngắn gọn trong khoảng 4-5 câu, đưa ra lời khuyên tích cực và phù hợp với câu hỏi. Hãy xưng hô là "mình" và gọi người dùng là "bạn". Không được nhắc đến cụm từ "tên file", hãy gọi đúng tên lá bài.`;

           // Lựa chọn 1: Dùng bản Gemini Pro (Hoạt động ổn định ở mọi nơi)
const apiUrl = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`;

            try {
                const response = await fetch(apiUrl, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: promptText }] }]
                    })
                });
                
                const data = await response.json();
                
                if (data.error) {
                    readingBox.innerHTML = `⚠️ Vũ trụ báo lỗi: ${data.error.message}`;
                } else {
                    let aiResponse = data.candidates[0].content.parts[0].text;
                    // Chuyển đổi định dạng in đậm của Markdown (**text**) sang HTML (<b>text</b>)
                    aiResponse = aiResponse.replace(/\*\*(.*?)\*\*/g, '<b>$1</b>');
                    readingBox.innerHTML = `✨ <b>Thông điệp từ lá ${cardName}:</b><br><br>${aiResponse}`;
                }
            } catch (error) {
                readingBox.innerHTML = "⚠️ Mất kết nối với vũ trụ. Vui lòng kiểm tra lại mạng hoặc API Key!";
            }
        }

        // Logic Xào Bài
        function shuffleDeck() {
            currentDeck = [...tarotDeck]; 
            for (let i = currentDeck.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [currentDeck[i], currentDeck[j]] = [currentDeck[j], currentDeck[i]]; 
            }
            
            statusMsg.innerText = "✨ Vũ trụ đã nhận thông điệp. Đang xào bài... ✨";
            board.innerHTML = ""; 
            readingBox.style.display = "none";
            btnDraw.disabled = false; 
            
            setTimeout(() => {
                statusMsg.innerText = "Bộ bài đã sẵn sàng. Hãy tập trung vào câu hỏi và Bốc Bài!";
            }, 1000);
        }

        // Logic Bốc Bài
        function drawCards() {
            board.innerHTML = ""; 
            readingBox.style.display = "none";
            const numCards = parseInt(spreadSelect.value); 
            
            statusMsg.innerText = "Nhấp vào từng lá bài để lật mở định mệnh của bạn...";
            btnDraw.disabled = true; 

            for (let i = 0; i < numCards; i++) {
                const drawnCard = currentDeck.pop(); 
                
                const cardSlot = document.createElement("div");
                cardSlot.classList.add("card-slot");
                
                cardSlot.innerHTML = `
                    <div class="card-inner">
                        <div class="card-front">
                            <img src="${cardBackImg}" alt="Mặt sau" onerror="this.src='https://via.placeholder.com/150x260/2a164d/ffffff?text=Card+Back'">
                        </div>
                        <div class="card-back">
                            <img src="${folderPath}${drawnCard}.PNG" alt="${drawnCard}" onerror="this.src='https://via.placeholder.com/150x260/fff/000?text=${drawnCard}'">
                        </div>
                    </div>
                `;

                // Sự kiện lật bài và gọi AI
                cardSlot.addEventListener("click", function() {
                    if (!this.classList.contains("flipped")) {
                        this.classList.add("flipped");
                        // Khi lật lá bài nào, tự động gọi API giải nghĩa lá đó
                        getTarotReading(drawnCard);
                    }
                });

                board.appendChild(cardSlot);
            }
        }

        btnShuffle.addEventListener("click", shuffleDeck);
        btnDraw.addEventListener("click", drawCards);

        spreadSelect.addEventListener("change", () => {
            btnDraw.disabled = true;
            board.innerHTML = "";
            readingBox.style.display = "none";
            statusMsg.innerText = "Bạn đã đổi kiểu trải bài. Vui lòng xào bài lại!";
        });
    </script>
</body>
</html>
