<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trạm kết nối Vũ Trụ - Tarot & Lenormand</title>
    <style>
        /* ================= CSS VARIABLES ================= */
        :root {
            --bg-main: #1a0b2e;
            --bg-panel: #2a164d;
            --text-main: #e5d3b3;
            --accent-gold: #c29d59;
            --accent-gold-hover: #e5d3b3; 
            --text-muted: #c4b5fd;
            --border-color: rgba(74, 43, 125, 0.5);
        }

        /* ================= RESET & CƠ BẢN ================= */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-main);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
            padding: 16px;
            min-height: 100vh;
            -webkit-text-size-adjust: 100%;
        }

        /* ── HEADER ── */
        .app-header {
            margin-bottom: 20px;
        }

        h1 {
            margin-bottom: 0;
            font-size: clamp(1.5rem, 3.5vw, 2.2rem);
            text-shadow: 0 0 15px var(--accent-gold);
            line-height: 1.3;
        }

        /* ── LAYOUT DESKTOP 2 CỘT ── */
        .app-layout {
            display: flex;
            gap: 0;
            align-items: stretch;
            min-height: calc(100vh - 100px);
            max-width: 1600px;
            margin: 0 auto;
        }

        /* Cột trái: Đặt câu hỏi + bốc bài */
        .panel-left {
            flex: 0 0 42%;
            max-width: 42%;
            display: flex;
            flex-direction: column;
            padding: 0 16px 24px 0;
            border-right: 1px solid var(--border-color);
        }

        /* Cột phải: Kết quả luận quẻ */
        .panel-right {
            flex: 1 1 58%;
            display: flex;
            flex-direction: column;
            padding: 0 0 24px 16px;
            position: relative;
        }

        /* ── MOBILE: stack lại thành 1 cột ── */
        @media (max-width: 860px) {
            .app-layout {
                flex-direction: column;
                min-height: unset;
            }
            .panel-left {
                flex: unset;
                max-width: 100%;
                padding: 0 0 24px 0;
                border-right: none;
                border-bottom: 1px solid var(--border-color);
                margin-bottom: 24px;
            }
            .panel-right {
                flex: unset;
                padding: 0;
            }
        }

        /* ── CONTROLS (panel trái) ── */
        .controls {
            margin-bottom: 16px;
            background: rgba(0, 0, 0, 0.4);
            padding: 16px;
            border-radius: 12px;
            display: block;
            width: 100%;
            border: 1px solid #4a2b7d;
        }

        .ai-inputs {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 15px;
        }

        input[type="text"], input[type="password"] {
            padding: 14px 12px;
            font-size: 16px;
            border-radius: 8px;
            background: var(--bg-panel);
            color: white;
            border: 1px solid var(--accent-gold);
            width: 100%;
            outline: none;
            -webkit-appearance: none;
            appearance: none;
        }

        input::placeholder {
            color: #a78bfa;
            opacity: 0.7;
        }

        .spread-row {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            align-items: center;
            justify-content: center;
        }

        .spread-row label {
            width: 100%;
            margin-bottom: 2px;
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        select {
            padding: 12px 10px;
            font-size: 16px;
            border-radius: 8px;
            background: var(--bg-panel);
            color: white;
            border: 1px solid var(--accent-gold);
            cursor: pointer;
            outline: none;
            -webkit-appearance: none;
            appearance: none;
            flex: 1 1 200px;
            min-width: 0;
        }

        .btn-row {
            display: flex;
            gap: 8px;
            justify-content: center;
            margin-top: 10px;
            flex-wrap: wrap;
        }

        .mystic-btn {
            padding: 13px 22px;
            font-size: 1rem;
            font-weight: bold;
            color: var(--bg-main);
            background-color: var(--accent-gold);
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: background-color 0.2s, box-shadow 0.2s, transform 0.1s;
            flex: 1 1 120px;
            min-width: 0;
            min-height: 44px;
            touch-action: manipulation;
        }

        .mystic-btn:active:not(:disabled) {
            transform: scale(0.97);
            background-color: var(--accent-gold-hover);
        }

        @media (hover: hover) {
            .mystic-btn:hover:not(:disabled) {
                background-color: var(--accent-gold-hover);
                box-shadow: 0 0 15px var(--accent-gold);
            }
        }

        .mystic-btn:disabled {
            background-color: #555;
            color: #888;
            cursor: not-allowed;
            box-shadow: none;
        }

        #status-message {
            font-size: clamp(0.9rem, 1.2vw, 1.05rem);
            margin-bottom: 16px;
            font-style: italic;
            color: var(--text-muted);
            padding: 0 4px;
            line-height: 1.5;
        }

        @media (max-width: 860px) {
            #status-message { font-size: clamp(0.95rem, 3vw, 1.1rem); }
        }

        /* --- BÀN BỐC BÀI & LÁ BÀI --- */
        .tarot-board {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            margin: 36px 0 24px 0;
            padding: 0 4px;
        }

        .card-slot {
            perspective: 1000px;
            width: clamp(90px, 12vw, 140px);
            height: clamp(158px, 21vw, 245px);
            cursor: pointer;
            position: relative;
            touch-action: manipulation;
        }

        @media (max-width: 860px) {
            .card-slot {
                width: clamp(100px, 28vw, 150px);
                height: clamp(175px, 49vw, 260px);
            }
            .tarot-board {
                margin: 36px auto 24px auto;
            }
        }

        .card-label {
            position: absolute;
            top: -24px;
            left: 0;
            width: 100%;
            font-size: clamp(0.65rem, 2.2vw, 0.85rem);
            color: var(--accent-gold);
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            text-shadow: 0 0 5px rgba(0,0,0,0.8);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .card-inner {
            width: 100%;
            height: 100%;
            position: relative;
            transition: transform 0.7s cubic-bezier(0.4, 0.2, 0.2, 1);
            transform-style: preserve-3d;
        }

        .card-slot.flipped .card-inner {
            transform: rotateY(180deg);
        }

        .card-front, .card-back {
            width: 100%;
            height: 100%;
            position: absolute;
            backface-visibility: hidden;
            -webkit-backface-visibility: hidden;
            border-radius: 10px;
            box-shadow: 0 6px 12px rgba(0,0,0,0.5);
            border: 2px solid var(--accent-gold);
        }

        .card-front {
            background-color: var(--bg-panel);
        }

        .card-front img, .card-back img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 8px;
            -webkit-touch-callout: none;
            pointer-events: none;
        }

        .card-back {
            transform: rotateY(180deg);
            background-color: #fff;
        }

        .card-slot .card-inner .card-back img.card-reversed {
            transform: rotate(180deg);
        }

        /* --- LOADING DOTS --- */
        .loading-dots::after {
            content: '';
            animation: dots 1.4s infinite;
        }
        @keyframes dots {
            0%   { content: ''; }
            25%  { content: '.'; }
            50%  { content: '..'; }
            75%  { content: '...'; }
        }

        /* --- KẾT QUẢ LUẬN QUẺ --- */
        .reading-placeholder {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            flex: 1;
            color: rgba(196, 181, 253, 0.3);
            font-size: 1rem;
            font-style: italic;
            gap: 16px;
            padding: 40px 20px;
            min-height: 300px;
            text-align: center;
            line-height: 1.7;
        }

        .reading-placeholder .placeholder-icon {
            font-size: 3.5rem;
            opacity: 0.25;
        }

        @media (max-width: 860px) {
            .reading-placeholder { display: none; }
        }

        #reading-result {
            background: rgba(42, 22, 77, 0.95);
            border: 1px solid var(--accent-gold);
            padding: 24px 20px;
            border-radius: 12px;
            text-align: left;
            line-height: 1.85;
            font-size: clamp(0.95rem, 1.1vw, 1.05rem);
            display: none;
            box-shadow: 0 0 30px rgba(194, 157, 89, 0.2);
            -webkit-overflow-scrolling: touch;
            flex: 1;
            overflow-y: auto;
            max-height: calc(100vh - 120px);
        }

        @media (max-width: 860px) {
            #reading-result {
                max-height: unset;
                overflow-y: visible;
                margin-bottom: 32px;
                font-size: clamp(0.95rem, 3vw, 1.1rem);
            }
        }

        /* NÚT COPY */
        .copy-btn-wrap {
            display: flex;
            justify-content: flex-end;
            margin-top: 18px;
            padding-top: 14px;
            border-top: 1px solid rgba(194, 157, 89, 0.3);
        }

        #btn-copy {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 10px 18px;
            font-size: 0.9rem;
            font-weight: bold;
            color: var(--bg-main);
            background-color: var(--accent-gold);
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: background-color 0.2s, transform 0.1s;
            touch-action: manipulation;
            min-height: 44px;
        }

        #btn-copy:active {
            transform: scale(0.96);
            background-color: var(--accent-gold-hover);
        }

        @media (hover: hover) {
            #btn-copy:hover {
                background-color: var(--accent-gold-hover);
                box-shadow: 0 0 10px var(--accent-gold);
            }
        }

        #btn-copy.copied {
            background-color: #4ade80;
            color: var(--bg-main);
        }

        /* SCROLLBAR */
        #reading-result::-webkit-scrollbar {
            width: 5px;
        }
        #reading-result::-webkit-scrollbar-track {
            background: rgba(255,255,255,0.04);
            border-radius: 4px;
        }
        #reading-result::-webkit-scrollbar-thumb {
            background: rgba(194, 157, 89, 0.4);
            border-radius: 4px;
        }
        #reading-result::-webkit-scrollbar-thumb:hover {
            background: rgba(194, 157, 89, 0.7);
        }

        /* LABELS */
        .panel-left-label, .panel-right-label {
            font-size: 0.75rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: rgba(194, 157, 89, 0.45);
            margin-bottom: 14px;
            text-align: left;
        }
        
        .panel-left-label { padding-left: 2px; }
        .panel-right-label { padding-left: 18px; }

        @media (max-width: 860px) {
            .panel-left-label, .panel-right-label { display: none; }
        }

        /* RESPONSIVE CHO MÀN HÌNH NHỎ */
        @media (max-width: 400px) {
            body { padding: 10px 8px; }
            .controls { padding: 12px 10px; }
            .tarot-board { gap: 14px; }
            #reading-result { padding: 16px 12px; }
        }
    </style>
</head>
<body>
    <div class="app-header">
        <h1>🔮 Trạm Lắng Nghe Vũ Trụ 🔮</h1>
    </div>

    <div class="app-layout">

        <div class="panel-left">
            <div class="panel-left-label">✦ Đặt câu hỏi &amp; bốc bài</div>
            <div class="controls">
                <div class="ai-inputs">
                    <input type="text" id="user-question" placeholder="💭 Bạn đang băn khoăn điều gì lúc này?">
                </div>

                <div class="spread-row">
                    <label for="spread-type">Bạn muốn vũ trụ làm rõ điều gì?</label>
                    <select id="spread-type">
                        <option value="intent_all">TOÀN DIỆN (Năng lượng cốt lõi & Sự kiện đời thực)</option>
                        <option value="intent_what">WHAT / YES-NO (Lời khuyên hành động nhanh & Định hướng)</option>
                        <option value="intent_why">WHY / HOW (Gốc rễ tâm lý, Nhân quả & Xu hướng sắp tới)</option>
                        <option value="intent_when">WHEN / WHO (Sự kiện cụ thể, Thời gian & Con người thực tế)</option>
                    </select>
                </div>
                <div class="btn-row">
                    <button id="btn-shuffle" class="mystic-btn">🔀 Xào Bài</button>
                    <button id="btn-draw" class="mystic-btn" disabled>✨ Bốc Bài</button>
                </div>
            </div>

            <div id="status-message">✨ Đặt câu hỏi và ấn "Xào Bài"... ✨</div>
            <div id="tarot-board" class="tarot-board"></div>
        </div>

        <div class="panel-right">
            <div class="panel-right-label">✦ Thông điệp vũ trụ</div>
            
            <div class="reading-placeholder" id="reading-placeholder">
                <div class="placeholder-icon">🔮</div>
                <div>Thông điệp từ vũ trụ sẽ hiện ra ở đây<br>sau khi bạn lật đủ các lá bài...</div>
            </div>

            <div id="reading-result">
                <div id="reading-content"></div>
                <div class="copy-btn-wrap">
                    <button id="btn-copy">
                        <span id="copy-icon">📋</span>
                        <span id="copy-label">Sao chép</span>
                    </button>
                </div>
            </div>
        </div>

    </div>

    <script>
        // HỆ THỐNG BÀI
        const tarotDeck = [
            "0thefool", "1themagician", "2thehighpriestess", "3theempress", "4theemperor", 
            "5thehierophant", "6thelovers", "7thechariot", "8strength", "9thehermit", 
            "10wheeloffortune", "11justice", "12thehangedman", "13death", "14temperance", 
            "15thedevil", "16thetower", "17thestar", "18themoon", "19thesun", "20judgement", "21theworld",
            "1cup", "2cup", "3cup", "4cup", "5cup", "6cup", "7cup", "8cup", "9cup", "10cup", "pagecup", "knightcup", "queencup", "kingcup",
            "1wand", "2wand", "3wand", "4wand", "5wand", "6wand", "7wand", "8wand", "9wand", "10wand", "pagewand", "knightwand", "queenwand", "kingwand",
            "1sword", "2sword", "3sword", "4sword", "5sword", "6sword", "7sword", "8sword", "9sword", "10sword", "pagesword", "knightsword", "queensword", "kingsword",
            "1pen", "2pen", "3pen", "4pen", "5pen", "6pen", "7pen", "8pen", "9pen", "10pen", "pagepen", "knightpen", "queenpen", "kingpen"
        ];

        const lenormandDeck = [
            "1rider", "2clover", "3ship", "4house", "5tree", "6clouds", "7snake", "8coffin",
            "9bouquet", "10scythe", "11whip", "12birds", "13child", "14fox", "15bear", "16stars",
            "17stork", "18dog", "19tower", "20garden", "21mountain", "22crossroads", "23mice", "24heart",
            "25ring", "26book", "27letter", "28man", "29woman", "30lilies", "31sun", "32moon",
            "33key", "34fish", "35anchor", "36cross"
        ];

        // ĐƯỜNG DẪN ẢNH ĐỘC LẬP
        const pathTarot = "assets/images/new_folder/";
        const pathLenormand = "assets/images/lenormand/";
        
        const backTarot = pathTarot + "card-back.PNG";
        const backLenormand = pathLenormand + "card-back-L.jpg"; 

        let currentTarotDeck = [];
        let currentLenormandDeck = [];
        
        let drawnCardsList = []; 
        let totalCardsToDraw = 0;
        let flippedCount = 0;    
        
        // HỆ THỐNG QUẢN LÝ TẢI TRỌNG (API & COOLDOWN)
        let currentKeyIndex = 0; 
        let isProcessing = false; 
        let cooldownTimer = null; 

        // TỈ LỆ BÀI NGƯỢC (Áp dụng cho Tarot)
        const REVERSAL_THRESHOLD = 30; // 30%

        const btnShuffle = document.getElementById("btn-shuffle");
        const btnDraw = document.getElementById("btn-draw");
        const board = document.getElementById("tarot-board");
        const statusMsg = document.getElementById("status-message");
        const spreadSelect = document.getElementById("spread-type");
        const readingBox = document.getElementById("reading-result");
        const readingContent = document.getElementById("reading-content");
        const btnCopy = document.getElementById("btn-copy");
        const readingPlaceholder = document.getElementById("reading-placeholder");

        // HÀM ẨN/HIỆN GIAO DIỆN KẾT QUẢ VÀ PLACEHOLDER
        function showReading() {
            readingBox.style.display = "flex";
            readingBox.style.flexDirection = "column";
            if (readingPlaceholder) {
                readingPlaceholder.style.display = "none";
            }
        }

        function hideReading() {
            readingBox.style.display = "none";
            if (readingPlaceholder) {
                readingPlaceholder.style.display = "flex";
            }
        }

        // NÚT COPY KẾT QUẢ
        btnCopy.addEventListener("click", () => {
            const text = readingContent.innerText || readingContent.textContent;
            if (!text) return;
            navigator.clipboard.writeText(text).then(() => {
                btnCopy.classList.add("copied");
                document.getElementById("copy-icon").textContent = "✅";
                document.getElementById("copy-label").textContent = "Đã sao chép!";
                setTimeout(() => {
                    btnCopy.classList.remove("copied");
                    document.getElementById("copy-icon").textContent = "📋";
                    document.getElementById("copy-label").textContent = "Sao chép";
                }, 2500);
            }).catch(() => {
                const range = document.createRange();
                range.selectNodeContents(readingContent);
                const sel = window.getSelection();
                sel.removeAllRanges();
                sel.addRange(range);
                document.execCommand("copy");
                sel.removeAllRanges();
                document.getElementById("copy-icon").textContent = "✅";
                document.getElementById("copy-label").textContent = "Đã sao chép!";
                setTimeout(() => {
                    document.getElementById("copy-icon").textContent = "📋";
                    document.getElementById("copy-label").textContent = "Sao chép";
                }, 2500);
            });
        });

        // ÉP CHỜ TĨNH TÂM 15 GIÂY (CHỐNG RATE LIMIT)
        function startCooldown(seconds) {
            let timeLeft = seconds;
            btnShuffle.disabled = true; 
            cooldownTimer = setInterval(() => {
                btnShuffle.textContent = `⏳ Tĩnh tâm (${timeLeft}s)`;
                timeLeft--;
                if (timeLeft < 0) {
                    clearInterval(cooldownTimer);
                    btnShuffle.textContent = "🔀 Xào Bài";
                    btnShuffle.disabled = false; 
                    statusMsg.innerText = "✨ Năng lượng đã phục hồi. Bạn có thể đặt câu hỏi mới!";
                }
            }, 1000);
        }

        // HÀM GỌI AI LUẬN QUẺ (TÍCH HỢP TƯ DUY MASTER READER)
       async function getFullTarotReading() {
            if (isProcessing) return;
            
            const question = document.getElementById("user-question").value.trim() || "Vũ trụ muốn gửi gắm thông điệp gì cho mình hôm nay?";
            const spreadMode = spreadSelect.value;
            
            showReading();
            isProcessing = true;
            btnShuffle.disabled = true; 
            readingContent.innerHTML = `🔮 <span class="loading-dots">Thông điệp đang được giải mã</span>`;

            // Bối cảnh AI (giữ nguyên như cũ của bạn)
            let spreadContext = "";
            let roleContext = "Bạn là một Reader Tarot, Lenormand và là một Chakra Healer thực tế, thấu cảm. Bạn có khả năng liên kết bức tranh tổng quan tốt. Bạn hiểu ý nghĩa của bài Tarot ngược, và hiểu ý nghĩa của Chakra Wisdom Oracle về màu sắc luân xa và năng lượng tiềm thức. ";

            const getReversedStr = (card) => (card.type === 'tarot' && card.reversed) ? " (ngược)" : "";

            if (spreadMode === "intent_what") {
                spreadContext = `người xem đang cần một câu trả lời nhanh gọn dạng WHAT hoặc YES/NO. Lá bài: ${drawnCardsList[0].name}${getReversedStr(drawnCardsList[0])}. Giải quyết thẳng thắn và định hướng tốt.`;
            } else if (spreadMode === "intent_why") {
                spreadContext = `Trải bài 3 lá Tarot: 
                Quá khứ: ${drawnCardsList[0].name}${getReversedStr(drawnCardsList[0])}, Hiện tại: ${drawnCardsList[1].name}${getReversedStr(drawnCardsList[1])}, Tương lai: ${drawnCardsList[2].name}${getReversedStr(drawnCardsList[2])}. 
                1. Đọc tổng quan (Ẩn chính, nguyên tố). 2. Phân tích nhân quả sâu sắc theo 3 mốc thời gian.`;
            } else if (spreadMode === "intent_when") {
                spreadContext = `3 lá Lenormand: ${drawnCardsList[0].name}, ${drawnCardsList[1].name}, ${drawnCardsList[2].name}. 
                Ghép nghĩa 3 lá này lại thành MỘT sự kiện thực tế, coi lá ở giữa làm trọng tâm.`;
            } else if (spreadMode === "intent_all") {
                spreadContext = `Gốc rễ nội tâm (Tarot): ${drawnCardsList[0].name}${getReversedStr(drawnCardsList[0])}. Sự kiện đời thực (Lenormand): ${drawnCardsList[1].name} và ${drawnCardsList[2].name}. 
                Đan cài sự kiện từ 2 lá Lenormand với năng lượng của lá Tarot.`;
            } else if (spreadMode === "intent_mbs") {
                spreadContext = `Trải bài M.B.S (Tâm linh - Tâm lý - Đời thực).
                - Spirit (Gốc rễ năng lượng - Chakra Oracle): ${drawnCardsList[0].name}.
                - Mind (Tâm lý/Bài học - Tarot): ${drawnCardsList[1].name}${getReversedStr(drawnCardsList[1])}.
                - Body (Sự kiện thực tế - Lenormand): ${drawnCardsList[2].name}.
                YÊU CẦU: Hãy liên kết sự rung động của Luân Xa dẫn đến trạng thái tâm lý của Tarot, và cuối cùng nó biểu hiện ra đời thực qua lá Lenormand như thế nào. Đưa ra lời khuyên để cân bằng.`;
            } else if (spreadMode === "intent_healing") {
                spreadContext = `Trải bài CHỮA LÀNH ĐIỂM NGHẼN.
                - Vết thương/Góc khuất (Chakra Oracle): ${drawnCardsList[0].name}.
                - Nguyên nhân kìm hãm (Tarot): ${drawnCardsList[1].name}${getReversedStr(drawnCardsList[1])}.
                - Giải pháp hành động (2 lá Lenormand): ${drawnCardsList[2].name} và ${drawnCardsList[3].name}.
                YÊU CẦU: Phân tích tổn thương năng lượng qua lá Chakra, giải mã nguyên nhân sâu xa từ Tarot. Đặc biệt, hãy ghép 2 lá Lenormand lại thành MỘT hành động cụ thể ở đời thực mà họ CẦN LÀM NGAY để khơi thông điểm nghẽn.`;
            }

            const promptText = `${roleContext} Người dùng đặt câu hỏi: "${question}". Trong quẻ này, ${spreadContext} Hãy viết bài luận giải bằng tiếng việt, phân tách các phần rõ ràng, ngôn từ thực tế (20% nội tâm, 80% lời khuyên hành động thực tế - Không nhắc đến tỷ lệ phần trăm này). Xưng hô là "mình" và "bạn".`;

            // 👉 THAY ĐỔI QUAN TRỌNG: Gọi đến API nội bộ của Vercel thay vì Google
            const apiUrl = `/api/gemini`;

            try {
                const response = await fetch(apiUrl, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ prompt: promptText }) // Chỉ gửi prompt lên server của mình
                });
                
                const data = await response.json();
                
                if (data.error) {
                    const isQuotaError = data.error.code === 429 || data.error.status === "RESOURCE_EXHAUSTED" || (data.error.message && data.error.message.toLowerCase().includes("quota"));
                    if (isQuotaError) {
                         readingContent.innerHTML = `🌙 Các vì sao đang nghỉ ngơi! Năng lượng vũ trụ đang nạp lại, bạn đợi 1 phút rồi thử bốc lại nhé! 💖`;
                    } else {
                        readingContent.innerHTML = `🌠 Tín hiệu chập chờn! Hãy thử xào bài và bốc lại nhé! ✨`;
                    }
                } else {
                    let aiResponse = data.candidates[0].content.parts[0].text;
                    aiResponse = aiResponse.replace(/\*\*(.*?)\*\*/g, '<b>$1</b>'); 
                    aiResponse = aiResponse.replace(/\n/g, '<br>'); 
                    readingContent.innerHTML = `✨ <b>THÔNG ĐIỆP TỪ VŨ TRỤ:</b><br><br>${aiResponse}`;
                }
            } catch (error) {
                readingContent.innerHTML = "📡 Trạm thu phát sóng tâm linh báo rớt mạng! Bạn kiểm tra mạng rồi thử lại nha! 🧚‍♀️";
            } finally {
                isProcessing = false;
                startCooldown(15);
                readingBox.scrollIntoView({ behavior: 'smooth', block: 'start' });
            }
        }
        // XÀO BÀI (VỚI HOẠT ẢNH VISUAL DECK)
        function shuffleDeck() {
            if (isProcessing || btnShuffle.disabled) return;

            document.body.classList.add("shuffling");
            board.innerHTML = ""; 
            hideReading();
            btnDraw.disabled = true;

            currentTarotDeck = [...tarotDeck]; 
            for (let i = currentTarotDeck.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [currentTarotDeck[i], currentTarotDeck[j]] = [currentTarotDeck[j], currentTarotDeck[i]]; 
            }

            currentLenormandDeck = [...lenormandDeck];
            for (let i = currentLenormandDeck.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [currentLenormandDeck[i], currentLenormandDeck[j]] = [currentLenormandDeck[j], currentLenormandDeck[i]]; 
            }
            
            statusMsg.innerText = "✨ Đang kết nối dòng chảy năng lượng... Hãy thả lỏng tâm trí nhé! ✨";
            drawnCardsList = []; 
            flippedCount = 0;    
            
            setTimeout(() => {
                document.body.classList.remove("shuffling"); 
                btnDraw.disabled = false; 
                statusMsg.innerText = "Năng lượng đã đồng điệu. Hãy hít một hơi thật sâu và ấn Bốc Bài!";
            }, 1200);
        }

        // BỐC BÀI & PHÂN PHỐI BÀI NGƯỢC
        function drawCards() {
            board.innerHTML = ""; 
            hideReading();
            drawnCardsList = [];
            flippedCount = 0;
            
            const spreadMode = spreadSelect.value; 
            let setupPlan = []; 

            // Hàm hỗ trợ rút bài
            const tarotPop = () => {
                const name = currentTarotDeck.pop();
                const isReversed = (Math.random() * 100) < REVERSAL_THRESHOLD;
                return { type: 'tarot', name: name, reversed: isReversed };
            }
            const lenormandPop = () => ({ type: 'lenormand', name: currentLenormandDeck.pop(), reversed: false });

            // Sắp xếp bài theo Intent
            if (spreadMode === "intent_what") {
                setupPlan.push(tarotPop());
            } else if (spreadMode === "intent_why") {
                setupPlan.push(tarotPop());
                setupPlan.push(tarotPop());
                setupPlan.push(tarotPop());
            } else if (spreadMode === "intent_when") {
                setupPlan.push(lenormandPop());
                setupPlan.push(lenormandPop());
                setupPlan.push(lenormandPop());
            } else if (spreadMode === "intent_all") {
                setupPlan.push(tarotPop());
                setupPlan.push(lenormandPop());
                setupPlan.push(lenormandPop());
            }

            drawnCardsList = setupPlan;
            totalCardsToDraw = setupPlan.length;
            
            statusMsg.innerText = `Hãy chọn lật mở ${totalCardsToDraw} chương định mệnh đang hiển hiện...`;
            btnDraw.disabled = true; 

            // Render lá bài ra DOM
            setupPlan.forEach((cardObj, index) => {
                const cardSlot = document.createElement("div");
                cardSlot.classList.add("card-slot");
                
                const isTarot = cardObj.type === 'tarot';
                const backImg = isTarot ? backTarot : backLenormand;
                const frontImg = isTarot ? `${pathTarot}${cardObj.name}.PNG` : `${pathLenormand}${cardObj.name}.PNG`;
                
                let labelText = "Thấu Thị";
                if (spreadMode === "intent_why") {
                    const mốc = ["Quá Khứ", "Hiện Tại", "Tương Lai"];
                    labelText = mốc[index];
                } else if (spreadMode === "intent_when") {
                    labelText = `Sự Kiện ${index + 1}`;
                } else if (spreadMode === "intent_all") {
                    labelText = isTarot ? "Gốc Rễ Nội Tâm" : `Sự Kiện Thực Tế ${index}`;
                }

                cardSlot.innerHTML = `
                    <div class="card-label">${labelText}</div>
                    <div class="card-inner">
                        <div class="card-front">
                            <img src="${backImg}" alt="Mặt sau" onerror="this.src='${backTarot}'">
                        </div>
                        <div class="card-back">
                            <img src="${frontImg}" alt="${cardObj.name}" 
                                 class="${cardObj.reversed ? 'card-reversed' : ''}" 
                                 onerror="this.src='https://via.placeholder.com/150x260/fff/000?text=${cardObj.name}'">
                        </div>
                    </div>
                `;

                cardSlot.addEventListener("click", function() {
                    if (isProcessing) return;

                    if (!this.classList.contains("flipped")) {
                        this.classList.add("flipped");
                        flippedCount++; 
                        
                        if (flippedCount === totalCardsToDraw) {
                            statusMsg.innerText = "🔮 Vũ trụ đang gửi tín hiệu xuống cho bạn ...🔮";
                            getFullTarotReading(); 
                        } else {
                            statusMsg.innerText = `Lật tiếp đi bạn, còn ${totalCardsToDraw - flippedCount} lá nữa thôi!`;
                        }
                    }
                });

                board.appendChild(cardSlot);
            });
        }

        btnShuffle.addEventListener("click", shuffleDeck);
        btnDraw.addEventListener("click", drawCards);

        spreadSelect.addEventListener("change", () => {
            if (isProcessing) return; 
            btnDraw.disabled = true;
            board.innerHTML = "";
            hideReading();
            document.body.classList.add("shuffling");
            setTimeout(() => document.body.classList.remove("shuffling"), 1200);
            statusMsg.innerText = "Bạn đã thay đổi câu hỏi. Xin hãy xào bài lại nhé!";
        });
    </script>
</body>
</html>
