<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🪐✨Lắng Nghe Vũ Trụ✨🪐</title>
    <style>
        /* ================= CSS (TRANG TRÍ GIAO DIỆN) ================= */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #1a0b2e;
            color: #e5d3b3;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
            padding: 20px;
        }

        h1 {
            margin-bottom: 20px;
            font-size: 2.5rem;
            text-shadow: 0 0 15px #c29d59;
        }

        .controls {
            margin-bottom: 20px;
            background: rgba(0, 0, 0, 0.4);
            padding: 20px;
            border-radius: 12px;
            display: inline-block;
            max-width: 800px;
            width: 100%;
            border: 1px solid #4a2b7d;
        }

        .ai-inputs {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 15px;
        }

        input[type="text"], input[type="password"] {
            padding: 12px;
            font-size: 1rem;
            border-radius: 8px;
            background: #2a164d;
            color: white;
            border: 1px solid #c29d59;
            width: 100%;
            outline: none;
        }
        
        input::placeholder {
            color: #a78bfa;
            opacity: 0.7;
        }

        select {
            padding: 10px;
            font-size: 1rem;
            border-radius: 8px;
            background: #2a164d;
            color: white;
            border: 1px solid #c29d59;
            margin-right: 10px;
            cursor: pointer;
            outline: none;
        }

        .mystic-btn {
            padding: 10px 20px;
            font-size: 1rem;
            font-weight: bold;
            color: #1a0b2e;
            background-color: #c29d59;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s;
            margin: 5px;
        }

        .mystic-btn:hover:not(:disabled) {
            background-color: #e5d3b3;
            box-shadow: 0 0 15px #c29d59;
        }

        .mystic-btn:disabled {
            background-color: #555;
            color: #888;
            cursor: not-allowed;
            box-shadow: none;
        }

        #status-message {
            font-size: 1.2rem;
            margin-bottom: 20px;
            font-style: italic;
            color: #c4b5fd;
        }

        .tarot-board {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            max-width: 1000px;
            margin: 0 auto 30px auto;
        }

        .card-slot {
            perspective: 1000px;
            width: 150px;
            height: 260px;
            cursor: pointer;
        }

        .card-inner {
            width: 100%;
            height: 100%;
            position: relative;
            transition: transform 0.6s cubic-bezier(0.4, 0.2, 0.2, 1);
            transform-style: preserve-3d;
        }

        .card-slot.flipped .card-inner {
            transform: rotateY(180deg);
        }

        .card-front, .card-back {
            width: 100%;
            height: 100%;
            position: absolute;
            backface-visibility: hidden;
            border-radius: 10px;
            box-shadow: 0 6px 12px rgba(0,0,0,0.4);
            border: 2px solid #c29d59;
        }

        .card-front {
            background-color: #2a164d; 
        }

        .card-front img, .card-back img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 8px;
        }

        .card-back {
            transform: rotateY(180deg);
            background-color: #fff;
        }

        #reading-result {
            background: rgba(42, 22, 77, 0.95);
            border: 1px solid #c29d59;
            padding: 25px 30px;
            border-radius: 12px;
            max-width: 800px;
            margin: 0 auto 40px auto;
            text-align: left;
            line-height: 1.8;
            font-size: 1.1rem;
            display: none;
            box-shadow: 0 0 25px rgba(194, 157, 89, 0.15);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔮 Trạm Lắng Nghe Vũ Trụ 🔮</h1>
        
        <div class="controls">
            <div class="ai-inputs">
                <input type="password" id="api-key" placeholder="🗝️ Gửi vào đây một chiếc chìa khóa để mở cửa vũ trụ...">
                <input type="text" id="user-question" placeholder="💭 Bạn đang băn khoăn điều gì?">
            </div>

            <div>
                <label for="spread-type">Cách thỉnh bài:</label>
                <select id="spread-type">
                    <option value="1">1 Lá (Thông điệp chớp nhoáng)</option>
                    <option value="3">3 Lá (Quá khứ - Hiện tại - Tương lai)</option>
                    <option value="5">5 Lá (Chữ thập - Bức tranh toàn cảnh)</option>
                </select>
                
                <button id="btn-shuffle" class="mystic-btn">Xào Bài</button>
                <button id="btn-draw" class="mystic-btn" disabled>Bốc Bài</button>
            </div>
        </div>

        <div id="status-message">✨ Hãy đặt câu hỏi và ấn "Xào Bài" để kết nối...</div>
        <div id="tarot-board" class="tarot-board"></div>
        <div id="reading-result"></div>
    </div>

    <script>
        const tarotDeck = [
            "0thefool", "1themagician", "2thehighpriestess", "3theempress", "4theemperor", 
            "5thehierophant", "6thelovers", "7thechariot", "8strength", "9thehermit", 
            "10wheeloffortune", "11justice", "12thehangedman", "13death", "14temperance", 
            "15thedevil", "16thetower", "17thestar", "18themoon", "19thesun", "20judgement", "21theworld",
            "1cup", "2cup", "3cup", "4cup", "5cup", "6cup", "7cup", "8cup", "9cup", "10cup", "pagecup", "knightcup", "queencup", "kingcup",
            "1wand", "2wand", "3wand", "4wand", "5wand", "6wand", "7wand", "8wand", "9wand", "10wand", "pagewand", "knightwand", "queenwand", "kingwand",
            "1sword", "2sword", "3sword", "4sword", "5sword", "6sword", "7sword", "8sword", "9sword", "10sword", "pagesword", "knightsword", "queensword", "kingsword",
            "1pen", "2pen", "3pen", "4pen", "5pen", "6pen", "7pen", "8pen", "9pen", "10pen", "pagepen", "knightpen", "queenpen", "kingpen"
        ];

        const folderPath = "assets/images/new_folder/";
        const cardBackImg = folderPath + "card-back.PNG"; 

        let currentDeck = []; 
        let drawnCardsList = []; 
        let flippedCount = 0;    
        let currentKeyIndex = 0; // Biến xoay vòng Key

        const btnShuffle = document.getElementById("btn-shuffle");
        const btnDraw = document.getElementById("btn-draw");
        const board = document.getElementById("tarot-board");
        const statusMsg = document.getElementById("status-message");
        const spreadSelect = document.getElementById("spread-type");
        const readingBox = document.getElementById("reading-result");

        // HÀM GỌI AI ĐỂ GIẢI TỔNG QUAN
        async function getFullTarotReading() {
            const rawKeys = document.getElementById("api-key").value.trim();
            const apiKeyArray = rawKeys.split(",").map(key => key.trim()).filter(key => key.length > 0);
            
            const question = document.getElementById("user-question").value.trim() || "Vũ trụ muốn gửi gắm thông điệp gì cho mình hôm nay?";
            const spreadType = parseInt(spreadSelect.value);
            
            readingBox.style.display = "block";

            // THÔNG BÁO LỖI: CHƯA NHẬP KEY
            if (apiKeyArray.length === 0) {
                readingBox.innerHTML = "✨ Vũ trụ cần một chiếc chìa khóa để mở cửa. Bạn gắn chìa khoá vào ô bên trên nhé! 🗝️";
                return;
            }

            if (currentKeyIndex >= apiKeyArray.length) {
                currentKeyIndex = 0;
            }

            const currentApiKey = apiKeyArray[currentKeyIndex];
            
            // THÔNG BÁO: ĐANG CHỜ PHẢN HỒI TỪ AI
            readingBox.innerHTML = `🔮 Trải bài đã sẵn sàng! Xin vui lòng chờ trong giây lát để nhận thông điệp từ vũ trụ...💫💫💫<br><span style="font-size: 0.9em; color: #a78bfa;">(Đang dùng cổng năng lượng số ${currentKeyIndex + 1})</span>`;

            let spreadContext = "";
            if (spreadType === 1) {
                spreadContext = `người dùng bốc được 1 lá duy nhất là: ${drawnCardsList[0]}. Hãy trả lời trực tiếp vấn đề, ngắn gọn nhưng sâu sắc.`;
            } else if (spreadType === 3) {
                spreadContext = `người dùng bốc trải bài 3 lá (Quá khứ - Hiện tại - Tương lai). Thứ tự: Lá 1 (Quá khứ): ${drawnCardsList[0]}, Lá 2 (Hiện tại): ${drawnCardsList[1]}, Lá 3 (Tương lai): ${drawnCardsList[2]}. Hãy luận giải chi tiết từng mốc thời gian và xâu chuỗi chúng lại. Hãy đưa ra thông điệp dẫn dắt về tâm trí cho lá này`;
            } else if (spreadType === 5) {
                spreadContext = `người dùng bốc trải bài 5 lá hình chữ thập (Tổng quan, Thử thách, Quá khứ, Tương lai gần, Lời khuyên). Danh sách 5 lá lần lượt là: ${drawnCardsList.join(", ")}. Hãy phân tích toàn bộ bức tranh này. Liên kết tất cả các lá bài và đưa ra vị thế hiện tại của người xem`;
            }

            const promptText = `Bạn là một Reader Tarot huyền bí, vô cùng ấm áp, thấu hiểu và sâu sắc. Người dùng đặt câu hỏi: "${question}". Trong trải bài này, ${spreadContext} Hãy viết một bài luận giải bằng tiếng Việt, phân tách các phần rõ ràng sau đó hãy làm phần tổng quan, nếu người dùng hỏi cho bản thân họ, hãy đọc bài theo hướng luận giải về người hỏi, nếu người hỏi hỏi về người khác, hãy luận giải theo người đang được hỏi, ngôn từ có tính chữa lành, động viên và đưa ra lời khuyên thiết thực. Hãy xưng hô là "mình" và gọi người dùng là "bạn". Tuyệt đối không nhắc đến các từ kỹ thuật như "tên file", "mảng", "hệ thống".`;

            const apiUrl = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${currentApiKey}`;

            try {
                const response = await fetch(apiUrl, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: promptText }] }]
                    })
                });
                
                const data = await response.json();
                
                if (data.error) {
                    const isQuotaError = data.error.code === 429 || 
                                         data.error.status === "RESOURCE_EXHAUSTED" || 
                                         (data.error.message && data.error.message.toLowerCase().includes("quota"));

                    if (isQuotaError) {
                        currentKeyIndex++; 
                        
                        if (currentKeyIndex < apiKeyArray.length) {
                            getFullTarotReading(); // Còn Key dự phòng thì gọi tiếp
                        } else {
                            // THÔNG BÁO LỖI: HẾT QUOTA TẤT CẢ CÁC KEY
                            readingBox.innerHTML = `🌙 Các vì sao đã đi ngủ mất rồi! Năng lượng vũ trụ hôm nay đã cạn, bạn hãy quay lại tâm tình vào ngày mai nhé! 💖`;
                            currentKeyIndex = 0; 
                        }
                    } else {
                        // THÔNG BÁO LỖI: LỖI HỆ THỐNG KHÁC TỪ GOOGLE
                        readingBox.innerHTML = `🌠 Tín hiệu từ vũ trụ đang bị chập chờn một chút xíu! Bạn thử xào bài và bốc lại nhé! ✨`;
                    }
                } else {
                    // KHI THÀNH CÔNG
                    let aiResponse = data.candidates[0].content.parts[0].text;
                    aiResponse = aiResponse.replace(/\*\*(.*?)\*\*/g, '<b>$1</b>'); 
                    aiResponse = aiResponse.replace(/\n/g, '<br>'); 
                    readingBox.innerHTML = `✨ <b>THÔNG ĐIỆP TỪ VŨ TRỤ:</b><br><br>${aiResponse}`;
                    
                    currentKeyIndex = (currentKeyIndex + 1) % apiKeyArray.length; // Xoay vòng Key
                }
            } catch (error) {
                // THÔNG BÁO LỖI: RỚT MẠNG / KHÔNG GỌI ĐƯỢC FETCH
                readingBox.innerHTML = "📡 Trạm thu phát sóng tâm linh báo rớt mạng mất rồi! Bạn kiểm tra lại Wi-Fi hoặc 4G rồi thử lại nha! 🧚‍♀️";
            }
        }

        // Logic Xào Bài
        function shuffleDeck() {
            currentDeck = [...tarotDeck]; 
            for (let i = currentDeck.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [currentDeck[i], currentDeck[j]] = [currentDeck[j], currentDeck[i]]; 
            }
            
            statusMsg.innerText = "✨ Đang tráo bài... Hãy thả lỏng tâm trí! ✨";
            board.innerHTML = ""; 
            readingBox.style.display = "none";
            drawnCardsList = []; 
            flippedCount = 0;    
            btnDraw.disabled = false; 
            
            setTimeout(() => {
                statusMsg.innerText = "Bài đã sẵn sàng. Hãy hít một hơi sâu, nghĩ về câu hỏi và Bốc Bài!";
            }, 1000);
        }

        // Logic Bốc Bài
        function drawCards() {
            board.innerHTML = ""; 
            readingBox.style.display = "none";
            drawnCardsList = [];
            flippedCount = 0;
            const numCards = parseInt(spreadSelect.value); 
            
            statusMsg.innerText = `Hãy lần lượt lật mở ${numCards} lá bài bằng trực giác của bạn...`;
            btnDraw.disabled = true; 

            for (let i = 0; i < numCards; i++) {
                const drawnCard = currentDeck.pop(); 
                drawnCardsList.push(drawnCard); 
                
                const cardSlot = document.createElement("div");
                cardSlot.classList.add("card-slot");
                
                cardSlot.innerHTML = `
                    <div class="card-inner">
                        <div class="card-front">
                            <img src="${cardBackImg}" alt="Mặt sau" onerror="this.src='https://via.placeholder.com/150x260/2a164d/ffffff?text=Card+Back'">
                        </div>
                        <div class="card-back">
                            <img src="${folderPath}${drawnCard}.PNG" alt="${drawnCard}" onerror="this.src='https://via.placeholder.com/150x260/fff/000?text=${drawnCard}'">
                        </div>
                    </div>
                `;

                cardSlot.addEventListener("click", function() {
                    if (!this.classList.contains("flipped")) {
                        this.classList.add("flipped");
                        flippedCount++; 
                        
                        if (flippedCount === numCards) {
                            statusMsg.innerText = "🔮 Định mệnh đã mở ra. Đang luận giải...";
                            getFullTarotReading(); 
                        } else {
                            statusMsg.innerText = `Lật tiếp đi bạn, còn ${numCards - flippedCount} lá nữa thôi!`;
                        }
                    }
                });

                board.appendChild(cardSlot);
            }
        }

        btnShuffle.addEventListener("click", shuffleDeck);
        btnDraw.addEventListener("click", drawCards);

        spreadSelect.addEventListener("change", () => {
            btnDraw.disabled = true;
            board.innerHTML = "";
            readingBox.style.display = "none";
            statusMsg.innerText = "Bạn đã đổi ý định. Xin hãy xào bài lại nhé!";
        });
    </script>
</body>
</html>
