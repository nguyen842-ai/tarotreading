<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trải Bài Tarot Online - Đọc Tổng Quan Trải Bài</title>
    <style>
        /* ================= CSS (TRANG TRÍ GIAO DIỆN) ================= */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #1a0b2e;
            color: #e5d3b3;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
            padding: 20px;
        }

        h1 {
            margin-bottom: 20px;
            font-size: 2.5rem;
            text-shadow: 0 0 10px #c29d59;
        }

        .controls {
            margin-bottom: 20px;
            background: rgba(0, 0, 0, 0.4);
            padding: 20px;
            border-radius: 10px;
            display: inline-block;
            max-width: 800px;
            width: 100%;
        }

        .ai-inputs {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 15px;
        }

        input[type="text"], input[type="password"] {
            padding: 10px;
            font-size: 1rem;
            border-radius: 5px;
            background: #2a164d;
            color: white;
            border: 1px solid #c29d59;
            width: 100%;
        }

        select {
            padding: 10px;
            font-size: 1rem;
            border-radius: 5px;
            background: #2a164d;
            color: white;
            border: 1px solid #c29d59;
            margin-right: 10px;
            cursor: pointer;
        }

        .mystic-btn {
            padding: 10px 20px;
            font-size: 1rem;
            font-weight: bold;
            color: #1a0b2e;
            background-color: #c29d59;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: 0.3s;
            margin: 5px;
        }

        .mystic-btn:hover:not(:disabled) {
            background-color: #e5d3b3;
            box-shadow: 0 0 15px #c29d59;
        }

        .mystic-btn:disabled {
            background-color: #555;
            color: #888;
            cursor: not-allowed;
        }

        #status-message {
            font-size: 1.2rem;
            margin-bottom: 20px;
            font-style: italic;
            color: #a78bfa;
        }

        .tarot-board {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            max-width: 1000px;
            margin: 0 auto 30px auto;
        }

        .card-slot {
            perspective: 1000px;
            width: 150px;
            height: 260px;
            cursor: pointer;
        }

        .card-inner {
            width: 100%;
            height: 100%;
            position: relative;
            transition: transform 0.6s;
            transform-style: preserve-3d;
        }

        .card-slot.flipped .card-inner {
            transform: rotateY(180deg);
        }

        .card-front, .card-back {
            width: 100%;
            height: 100%;
            position: absolute;
            backface-visibility: hidden;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.5);
            border: 2px solid #c29d59;
        }

        .card-front {
            background-color: #2a164d; 
        }

        .card-front img, .card-back img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 8px;
        }

        .card-back {
            transform: rotateY(180deg);
            background-color: #fff;
        }

        #reading-result {
            background: rgba(42, 22, 77, 0.9);
            border: 1px solid #c29d59;
            padding: 25px;
            border-radius: 10px;
            max-width: 800px;
            margin: 0 auto 40px auto;
            text-align: left;
            line-height: 1.7;
            font-size: 1.1rem;
            display: none;
            box-shadow: 0 0 20px rgba(194, 157, 89, 0.2);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔮 Free Reading Tarot 🔮</h1>
        
        <div class="controls">
            <div class="ai-inputs">
                <input type="password" id="api-key" placeholder="Nhập mã khóa để kết nối với vũ trụ ^-^...">
                <input type="text" id="user-question" placeholder="Bạn đang băn khoăn điều gì? (VD: Tình duyên tháng này ra sao?)">
            </div>

            <div>
                <label for="spread-type">Chọn kiểu trải bài:</label>
                <select id="spread-type">
                    <option value="1">1 Lá (Yes/No - Thông điệp ngày)</option>
                    <option value="3">3 Lá (Quá khứ - Hiện tại - Tương lai)</option>
                    <option value="5">5 Lá (Chữ thập - Mở rộng vấn đề)</option>
                </select>
                
                <button id="btn-shuffle" class="mystic-btn">Xào Bài</button>
                <button id="btn-draw" class="mystic-btn" disabled>Bốc Bài</button>
            </div>
        </div>

        <div id="status-message">Hãy nhập Key, đặt câu hỏi và ấn "Xào Bài"...</div>
        <div id="tarot-board" class="tarot-board"></div>
        <div id="reading-result"></div>
    </div>

    <script>
        const tarotDeck = [
            "0thefool", "1themagician", "2thehighpriestess", "3theempress", "4theemperor", 
            "5thehierophant", "6thelovers", "7thechariot", "8strength", "9thehermit", 
            "10wheeloffortune", "11justice", "12thehangedman", "13death", "14temperance", 
            "15thedevil", "16thetower", "17thestar", "18themoon", "19thesun", "20judgement", "21theworld",
            "1cup", "2cup", "3cup", "4cup", "5cup", "6cup", "7cup", "8cup", "9cup", "10cup", "pagecup", "knightcup", "queencup", "kingcup",
            "1wand", "2wand", "3wand", "4wand", "5wand", "6wand", "7wand", "8wand", "9wand", "10wand", "pagewand", "knightwand", "queenwand", "kingwand",
            "1sword", "2sword", "3sword", "4sword", "5sword", "6sword", "7sword", "8sword", "9sword", "10sword", "pagesword", "knightsword", "queensword", "kingsword",
            "1pen", "2pen", "3pen", "4pen", "5pen", "6pen", "7pen", "8pen", "9pen", "10pen", "pagepen", "knightpen", "queenpen", "kingpen"
        ];

        const folderPath = "assets/images/new_folder/";
        const cardBackImg = folderPath + "card-back.PNG"; 

        let currentDeck = []; 
        let drawnCardsList = []; // Mảng lưu danh sách các lá bài đã được bốc theo thứ tự
        let flippedCount = 0;    // Biến đếm xem người dùng đã lật bao nhiêu lá

        const btnShuffle = document.getElementById("btn-shuffle");
        const btnDraw = document.getElementById("btn-draw");
        const board = document.getElementById("tarot-board");
        const statusMsg = document.getElementById("status-message");
        const spreadSelect = document.getElementById("spread-type");
        const readingBox = document.getElementById("reading-result");

        // HÀM GỌI AI ĐỂ GIẢI TỔNG QUAN TOÀN BỘ TRẢI BÀI
        async function getFullTarotReading() {
            const apiKey = document.getElementById("api-key").value.trim();
            const question = document.getElementById("user-question").value.trim() || "Thông điệp chung cho tôi hôm nay là gì?";
            const spreadType = parseInt(spreadSelect.value);
            
            readingBox.style.display = "block";

            if (!apiKey) {
                readingBox.innerHTML = "⚠️ Vui lòng điền mã khóa ở phía trên để Pháp sư giải nghĩa toàn bộ trải bài!";
                return;
            }

            readingBox.innerHTML = `⏳ Bạn đã lật mở tất cả các lá bài. Pháp sư đang định tâm để giải mã toàn bộ quẻ bài này cho bạn...`;

            // Tự động tạo Prompt thông minh tùy theo số lượng lá bài người dùng bốc
            let spreadContext = "";
            if (spreadType === 1) {
                spreadContext = `người dùng bốc được 1 lá duy nhất là: ${drawnCardsList[0]}. Hãy trả lời trực tiếp vấn đề theo dạng Yes/No hoặc thông điệp cốt lõi.`;
            } else if (spreadType === 3) {
                spreadContext = `người dùng bốc trải bài 3 lá (Quá khứ - Hiện tại - Tương lai). Thứ tự các lá bài lần lượt là: Lá 1 (Quá khứ): ${drawnCardsList[0]}, Lá 2 (Hiện tại): ${drawnCardsList[1]}, Lá 3 (Tương lai): ${drawnCardsList[2]}. Hãy luận giải chi tiết từng lá tương ứng với từng mốc thời gian và xâu chuỗi chúng lại để trả lời câu hỏi.`;
            } else if (spreadType === 5) {
                spreadContext = `người dùng bốc trải bài 5 lá hình chữ thập đại diện cho: Tổng quan, Thử thách, Quá khứ, Tương lai gần và Lời khuyên. Danh sách 5 lá lần lượt là: ${drawnCardsList.join(", ")}. Hãy phân tích toàn bộ bức tranh này.`;
            }

            const promptText = `Bạn là một Reader Tarot huyền bí, thấu hiểu tâm lý học và sâu sắc. Người dùng đặt câu hỏi: "${question}". Trong kiểu trải bài này, ${spreadContext} Hãy viết một bài luận giải chi tiết bằng tiếng Việt, phân tách các phần rõ ràng, ngôn từ có tính chữa lành, định hướng và đưa ra lời khuyên tích cực. Hãy xưng hô là "mình" và gọi người dùng là "bạn". Tuyệt đối không nhắc đến các từ kỹ thuật như "tên file", "mảng", "array".`;

            // Đã sửa đổi gọi trực tiếp core model xịn nhất của bạn: gemini-2.5-flash
            const apiUrl = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`;

            try {
                const response = await fetch(apiUrl, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: promptText }] }]
                    })
                });
                
                const data = await response.json();
                
                if (data.error) {
                    readingBox.innerHTML = `⚠️ Vũ trụ báo lỗi: ${data.error.message}`;
                } else {
                            // NẾU CÓ LỖI TỪ API
        if (data.error) {
            // Kiểm tra xem có phải lỗi hết Quota không (Mã 429 hoặc có chứa chữ 'quota')
            const isQuotaError = data.error.code === 429 || 
                                 data.error.status === "RESOURCE_EXHAUSTED" || 
                                 (data.error.message && data.error.message.toLowerCase().includes("quota"));

            if (isQuotaError) {
                console.log(`Key số ${currentKeyIndex + 1} hết hạn. Đang thử Key tiếp theo...`);
                
                currentKeyIndex++; // Chuyển sang Key tiếp theo
                
                if (currentKeyIndex < apiKeyArray.length) {
                    getFullTarotReading(); // Còn Key thì gọi lại AI
                } else {
                    // KHI TẤT CẢ CÁC KEY ĐỀU ĐÃ HẾT QUOTA
                    readingBox.innerHTML = `⚠️ Hôm nay đã hết lượt liên kết với vũ trụ, xin hãy thử lại sau.`;
                    currentKeyIndex = 0; // Reset lại vòng lặp Key
                }
            } else {
                // Các lỗi lặt vặt khác (ví dụ: mất mạng, model bị lỗi, sai cú pháp)
                readingBox.innerHTML = `⚠️ Tín hiệu vũ trụ bị nhiễu: ${data.error.message}`;
            }
        } 


        // Logic Xào Bài
        function shuffleDeck() {
            currentDeck = [...tarotDeck]; 
            for (let i = currentDeck.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [currentDeck[i], currentDeck[j]] = [currentDeck[j], currentDeck[i]]; 
            }
            
            statusMsg.innerText = "✨ Vũ trụ đã nhận thông điệp. Đang xào bài... ✨";
            board.innerHTML = ""; 
            readingBox.style.display = "none";
            drawnCardsList = []; // Reset danh sách bài bốc
            flippedCount = 0;    // Reset bộ đếm lật bài
            btnDraw.disabled = false; 
            
            setTimeout(() => {
                statusMsg.innerText = "Bộ bài đã sẵn sàng. Hãy tập trung vào câu hỏi và Bốc Bài!";
            }, 1000);
        }

        // Logic Bốc Bài
        function drawCards() {
            board.innerHTML = ""; 
            readingBox.style.display = "none";
            drawnCardsList = [];
            flippedCount = 0;
            const numCards = parseInt(spreadSelect.value); 
            
            statusMsg.innerText = `Hãy lật mở lần lượt cả ${numCards} lá bài để nghe Pháp sư luận giải...`;
            btnDraw.disabled = true; 

            for (let i = 0; i < numCards; i++) {
                const drawnCard = currentDeck.pop(); 
                drawnCardsList.push(drawnCard); // Lưu tên lá bài vào danh sách bốc theo thứ tự
                
                const cardSlot = document.createElement("div");
                cardSlot.classList.add("card-slot");
                
                cardSlot.innerHTML = `
                    <div class="card-inner">
                        <div class="card-front">
                            <img src="${cardBackImg}" alt="Mặt sau" onerror="this.src='https://via.placeholder.com/150x260/2a164d/ffffff?text=Card+Back'">
                        </div>
                        <div class="card-back">
                            <img src="${folderPath}${drawnCard}.PNG" alt="${drawnCard}" onerror="this.src='https://via.placeholder.com/150x260/fff/000?text=${drawnCard}'">
                        </div>
                    </div>
                `;

                // Sự kiện lật bài
                cardSlot.addEventListener("click", function() {
                    if (!this.classList.contains("flipped")) {
                        this.classList.add("flipped");
                        flippedCount++; // Tăng số lá bài đã lật lên 1
                        
                        // Kiểm tra xem người dùng đã lật mở HẾT tất cả các lá trên bàn chưa
                        if (flippedCount === numCards) {
                            statusMsg.innerText = "🔮 Toàn bộ định mệnh đã mở ra. Đang luận quẻ bài...";
                            getFullTarotReading(); // Gọi AI giải nghĩa toàn bộ trải bài
                        } else {
                            statusMsg.innerText = `Bạn đã lật ${flippedCount}/${numCards} lá. Hãy lật tiếp những lá còn lại!`;
                        }
                    }
                });

                board.appendChild(cardSlot);
            }
        }

        btnShuffle.addEventListener("click", shuffleDeck);
        btnDraw.addEventListener("click", drawCards);

        spreadSelect.addEventListener("change", () => {
            btnDraw.disabled = true;
            board.innerHTML = "";
            readingBox.style.display = "none";
            statusMsg.innerText = "Bạn đã đổi kiểu trải bài. Vui lòng xào bài lại!";
        });
    </script>
</body>
</html>
