<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trạm Lắng Nghe Vũ Trụ © 2026 All Rights Reserved - developed by Nguyen842</title>
    <style>
        /* ================= CSS VARIABLES ================= */
        :root {
            --bg-main: #1a0b2e;
            --bg-panel: #2a164d;
            --text-main: #e5d3b3;
            --accent-gold: #c29d59;
            --accent-gold-hover: #e5d3b3; 
            --text-muted: #c4b5fd;
            --border-color: rgba(74, 43, 125, 0.5);
        }

        /* ================= RESET & CƠ BẢN ================= */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-main);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
            padding: 16px;
            min-height: 100vh;
            -webkit-text-size-adjust: 100%;
        }

        /* ── HEADER ── */
        .app-header { margin-bottom: 20px; }

        h1 {
            margin-bottom: 0;
            font-size: clamp(1.5rem, 3.5vw, 2.2rem);
            text-shadow: 0 0 15px var(--accent-gold);
            line-height: 1.3;
        }

        /* ================= HỆ THỐNG GIAO DIỆN TABS ================= */
        .tabs-container {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin: 20px auto 30px auto;
            max-width: 600px;
        }

        .tab-btn {
            background: var(--bg-panel);
            color: var(--text-muted);
            border: 1px solid var(--border-color);
            padding: 12px 24px;
            border-radius: 30px;
            cursor: pointer;
            font-size: clamp(0.9rem, 2.5vw, 1rem);
            font-weight: bold;
            transition: all 0.3s ease;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        .tab-btn:hover {
            color: var(--accent-gold-hover);
            border-color: var(--accent-gold);
            background: rgba(74, 43, 125, 0.3);
        }

        .tab-btn.active {
            background: var(--accent-gold);
            color: var(--bg-main);
            border-color: var(--accent-gold);
            box-shadow: 0 0 15px var(--accent-gold);
        }

        .tab-content {
            display: none;
            animation: fadeIn 0.4s ease-in-out;
        }

        .tab-content.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* ── STYLE CHO TAB GIỚI THIỆU CHUNG ── */
        #intro-container {
            background: rgba(42, 22, 77, 0.6);
            padding: 24px;
            border-radius: 16px;
            border: 1px solid var(--border-color);
            text-align: left;
            max-width: 900px;
            margin: 0 auto 30px auto;
            box-shadow: 0 8px 25px rgba(0,0,0,0.3);
        }

        .sheet-section {
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 1px solid rgba(194, 157, 89, 0.2);
        }
        .sheet-section:last-child { margin-bottom: 0; padding-bottom: 0; border-bottom: none; }
        
        .sheet-section h2 { 
            color: var(--accent-gold); 
            margin-bottom: 14px; 
            font-size: 1.4rem; 
            border-left: 4px solid var(--accent-gold);
            padding-left: 10px;
            text-shadow: 0 0 10px rgba(194, 157, 89, 0.2);
        }
        
        .sheet-section p { 
            color: var(--text-main); 
            line-height: 1.8; 
            font-size: 1.05rem; 
        }

        /* ── LAYOUT DESKTOP 2 CỘT (TAB BỐC BÀI) ── */
        .app-layout {
            display: flex;
            gap: 0;
            align-items: stretch;
            min-height: calc(100vh - 180px);
            max-width: 1600px;
            margin: 0 auto;
        }

        .panel-left {
            flex: 0 0 42%;
            max-width: 42%;
            display: flex;
            flex-direction: column;
            padding: 0 16px 24px 0;
            border-right: 1px solid var(--border-color);
        }

        .panel-right {
            flex: 1 1 58%;
            display: flex;
            flex-direction: column;
            padding: 0 0 24px 16px;
            position: relative;
        }

        /* ── MOBILE ── */
        @media (max-width: 860px) {
            .app-layout { flex-direction: column; min-height: unset; }
            .panel-left {
                flex: unset; max-width: 100%; padding: 0 0 24px 0;
                border-right: none; border-bottom: 1px solid var(--border-color); margin-bottom: 24px;
            }
            .panel-right { flex: unset; padding: 0; }
        }

        /* ── CONTROLS ── */
        .controls {
            margin-bottom: 16px; background: rgba(0, 0, 0, 0.4);
            padding: 16px; border-radius: 12px; display: block; width: 100%; border: 1px solid #4a2b7d;
        }

        .ai-inputs { display: flex; flex-direction: column; gap: 12px; margin-bottom: 15px; }

        input[type="text"] {
            padding: 14px 12px; font-size: 16px; border-radius: 8px;
            background: var(--bg-panel); color: white; border: 1px solid var(--accent-gold);
            width: 100%; outline: none; -webkit-appearance: none; appearance: none;
        }
        input::placeholder { color: #a78bfa; opacity: 0.7; }

        .spread-row { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; justify-content: center; }
        .spread-row label { width: 100%; margin-bottom: 2px; font-size: 0.9rem; color: var(--text-muted); text-align: left; }
        
        select {
            padding: 12px 10px; font-size: 16px; border-radius: 8px;
            background: var(--bg-panel); color: white; border: 1px solid var(--accent-gold);
            cursor: pointer; outline: none; -webkit-appearance: none; appearance: none;
            width: 100%; margin-bottom: 12px;
        }

        .btn-row { display: flex; gap: 8px; justify-content: center; margin-top: 10px; flex-wrap: wrap; }
        
        .mystic-btn {
            padding: 13px 22px; font-size: 1rem; font-weight: bold; color: var(--bg-main);
            background-color: var(--accent-gold); border: none; border-radius: 8px;
            cursor: pointer; transition: background-color 0.2s, box-shadow 0.2s, transform 0.1s;
            flex: 1 1 120px; min-width: 0; min-height: 44px; touch-action: manipulation;
        }
        .mystic-btn:active:not(:disabled) { transform: scale(0.97); background-color: var(--accent-gold-hover); }
        @media (hover: hover) {
            .mystic-btn:hover:not(:disabled) { background-color: var(--accent-gold-hover); box-shadow: 0 0 15px var(--accent-gold); }
        }
        .mystic-btn:disabled { background-color: #555; color: #888; cursor: not-allowed; box-shadow: none; }

        #status-message { font-size: clamp(0.9rem, 1.2vw, 1.05rem); margin-bottom: 16px; font-style: italic; color: var(--text-muted); line-height: 1.5; }

        /* --- BÀN BỐC BÀI & LÁ BÀI --- */
        .tarot-board { display: flex; flex-wrap: wrap; justify-content: center; gap: 45px 20px; margin: 36px 0 24px 0; padding: 0 4px; }
        
        .card-slot { perspective: 1000px; width: clamp(90px, 12vw, 140px); height: clamp(158px, 21vw, 245px); cursor: pointer; position: relative; touch-action: manipulation; }
        @media (max-width: 860px) { .card-slot { width: clamp(100px, 28vw, 150px); height: clamp(175px, 49vw, 260px); } }

        .card-label {
            position: absolute; top: -24px; left: 0; width: 100%;
            font-size: clamp(0.65rem, 2.2vw, 0.85rem); color: var(--accent-gold); font-weight: bold;
            text-transform: uppercase; letter-spacing: 1px; text-shadow: 0 0 5px rgba(0,0,0,0.8);
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }

        .card-inner { width: 100%; height: 100%; position: relative; transition: transform 0.7s cubic-bezier(0.4, 0.2, 0.2, 1); transform-style: preserve-3d; }
        .card-slot.flipped .card-inner { transform: rotateY(180deg); }
        .card-front, .card-back {
            width: 100%; height: 100%; position: absolute; backface-visibility: hidden; -webkit-backface-visibility: hidden;
            border-radius: 10px; box-shadow: 0 6px 12px rgba(0,0,0,0.5); border: 2px solid var(--accent-gold);
        }
        .card-front { background-color: var(--bg-panel); }
        .card-front img, .card-back img { width: 100%; height: 100%; object-fit: cover; border-radius: 8px; -webkit-touch-callout: none; pointer-events: none; }
        .card-back { transform: rotateY(180deg); background-color: #fff; }
        .card-slot .card-inner .card-back img.card-reversed { transform: rotate(180deg); }

        /* --- LOADING & KẾT QUẢ --- */
        .loading-dots::after { content: ''; animation: dots 1.4s infinite; }
        @keyframes dots { 0% {content:'';} 25% {content:'.';} 50% {content:'..';} 75% {content:'...';} }

        .reading-placeholder {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            flex: 1; color: rgba(196, 181, 253, 0.3); font-size: 1rem; font-style: italic; gap: 16px; padding: 40px 20px; min-height: 300px; line-height: 1.7;
        }
        .placeholder-icon { font-size: 3.5rem; opacity: 0.25; }
        @media (max-width: 860px) { .reading-placeholder { display: none; } }

        #reading-result {
            background: rgba(42, 22, 77, 0.95); border: 1px solid var(--accent-gold); padding: 24px 20px; border-radius: 12px;
            text-align: left; line-height: 1.85; font-size: clamp(0.95rem, 1.1vw, 1.05rem); display: none;
            box-shadow: 0 0 30px rgba(194, 157, 89, 0.2); -webkit-overflow-scrolling: touch; flex: 1; overflow-y: auto; max-height: calc(100vh - 120px);
        }
        @media (max-width: 860px) { #reading-result { max-height: unset; overflow-y: visible; margin-bottom: 32px; } }

        .copy-btn-wrap { display: flex; justify-content: flex-end; margin-top: 18px; padding-top: 14px; border-top: 1px solid rgba(194, 157, 89, 0.3); }
        #btn-copy { display: flex; align-items: center; gap: 6px; padding: 10px 18px; font-size: 0.9rem; font-weight: bold; color: var(--bg-main); background-color: var(--accent-gold); border: none; border-radius: 8px; cursor: pointer; transition: background-color 0.2s, transform 0.1s; }
        #btn-copy:active { transform: scale(0.96); background-color: var(--accent-gold-hover); }
        #btn-copy.copied { background-color: #4ade80; color: var(--bg-main); }

        #reading-result::-webkit-scrollbar { width: 5px; }
        #reading-result::-webkit-scrollbar-track { background: rgba(255,255,255,0.04); border-radius: 4px; }
        #reading-result::-webkit-scrollbar-thumb { background: rgba(194, 157, 89, 0.4); border-radius: 4px; }

        .panel-left-label, .panel-right-label { font-size: 0.75rem; letter-spacing: 2px; text-transform: uppercase; color: rgba(194, 157, 89, 0.45); margin-bottom: 14px; text-align: left; }
        .panel-left-label { padding-left: 2px; } .panel-right-label { padding-left: 18px; }
        @media (max-width: 860px) { .panel-left-label, .panel-right-label { display: none; } }
    </style>
</head>
<body>
    <div class="app-header">
        <h1>🔮 Trạm Lắng Nghe Vũ Trụ 🔮</h1>
    </div>

    <div class="tabs-container">
        <button class="tab-btn active" onclick="switchTab('tab-intro')">💌 Giới Thiệu Chung</button>
        <button class="tab-btn" onclick="switchTab('tab-reading')">✨ Bốc Bài & Giải Mã</button>
    </div>

    <div id="tab-intro" class="tab-content active">
        <div id="intro-container">
            <div id="loading-intro" style="text-align: center; color: var(--text-muted); font-style: italic; padding: 20px;">
                Đang kết nối luồng ánh sáng đến dữ liệu của Trạm... ⏳
            </div>
            <div id="sheets-content"></div>
        </div>
    </div>

    <div id="tab-reading" class="tab-content">
        <div class="app-layout">
            <div class="panel-left">
                <div class="panel-left-label">✦ Đặt câu hỏi &amp; bốc bài</div>
                <div class="controls">
                    <div class="ai-inputs">
                        <input type="text" id="user-question" placeholder="💭 Bạn đang băn khoăn điều gì lúc này?">
                    </div>
                    
                    <div class="spread-row">
                        <label for="reading-style">Hệ thống giải mã:</label>
                        <select id="reading-style">
                            <option value="modern" selected>✨ Xem Bài Hiện Đại</option>
                            <option value="classical">⚜️ Xem TAROT Cổ Điển</option>
                        </select>
                    </div>

                    <div class="spread-row">
                        <label for="spread-type">Bạn muốn vũ trụ làm rõ điều gì?</label>
                        <select id="spread-type">
                            </select>
                    </div>

                    <div class="btn-row">
                        <button id="btn-shuffle" class="mystic-btn">🔀 Xào Bài</button>
                        <button id="btn-draw" class="mystic-btn" disabled>✨ Bốc Bài</button>
                    </div>
                </div>

                <div id="status-message">✨ Đặt câu hỏi và ấn "Xào Bài"... ✨</div>
                <div id="tarot-board" class="tarot-board"></div>
            </div>

            <div class="panel-right">
                <div class="panel-right-label">✦ Thông điệp vũ trụ ✦</div>
                <div class="reading-placeholder" id="reading-placeholder">
                    <div class="placeholder-icon">🔮</div>
                    <div>Thông điệp từ vũ trụ sẽ hiện ra ở đây<br>sau khi bạn lật đủ các lá bài...</div>
                </div>

                <div id="reading-result">
                    <div id="reading-content"></div>
                    <div class="copy-btn-wrap">
                        <button id="btn-copy">
                            <span id="copy-icon">🔮</span>
                            <span id="copy-label">Sao chép</span>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // --- LOGIC CHUYỂN TABS ---
        function switchTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));

            document.getElementById(tabId).classList.add('active');
            event.currentTarget.classList.add('active');
        }

        // --- GỌI API GOOGLE SHEETS CHO TAB GIỚI THIỆU ---
        async function fetchIntroData() {
            const contentDiv = document.getElementById('sheets-content');
            const loadingDiv = document.getElementById('loading-intro');
            const apiUrl = 'https://tarotreading-eight.vercel.app/api/sheets';

            try {
                const response = await fetch(apiUrl);
                const data = await response.json();

                if (data.valueRanges && data.valueRanges.length > 0) {
                    loadingDiv.style.display = 'none';
                    let htmlOutput = '';

                    data.valueRanges.forEach((sheet, index) => {
                        const values = sheet.values || [];
                        const title = (values[0] && values[0][0]) ? values[0][0] : `Mục ${index + 1}`;
                        const content = (values[1] && values[1][0]) ? values[1][0] : `Nội dung đang được cập nhật...`;
                        const formattedContent = content.replace(/\n/g, '<br>');

                        htmlOutput += `
                            <div class="sheet-section">
                                <h2>${title}</h2>
                                <p>${formattedContent}</p>
                            </div>
                        `;
                    });

                    contentDiv.innerHTML = htmlOutput;
                } else {
                    throw new Error("Không thể trích xuất mảng dữ liệu.");
                }
            } catch (error) {
                console.error("Lỗi Sheets API:", error);
                loadingDiv.innerHTML = "📡 Trạm không thể tải thông tin giới thiệu. Bạn vui lòng kiểm tra lại kết nối mạng hoặc liên hệ bên cung cấp dịch vụ!";
            }
        }

        document.addEventListener("DOMContentLoaded", fetchIntroData);

        // ================= DANH SÁCH DỮ LIỆU BÀI GỐC =================
        const tarotDeck = [
            "0thefool", "1themagician", "2thehighpriestess", "3theempress", "4theemperor", 
            "5thehierophant", "6thelovers", "7thechariot", "8strength", "9thehermit", 
            "10wheeloffortune", "11justice", "12thehangedman", "13death", "14temperance", 
            "15thedevil", "16thetower", "17thestar", "18themoon", "19thesun", "20judgement", "21theworld",
            "1cup", "2cup", "3cup", "4cup", "5cup", "6cup", "7cup", "8cup", "9cup", "10cup", "pagecup", "knightcup", "queencup", "kingcup",
            "1wand", "2wand", "3wand", "4wand", "5wand", "6wand", "7wand", "8wand", "9wand", "10wand", "pagewand", "knightwand", "queenwand", "kingwand",
            "1sword", "2sword", "3sword", "4sword", "5sword", "6sword", "7sword", "8sword", "9sword", "10sword", "pagesword", "knightsword", "queensword", "kingsword",
            "1pen", "2pen", "3pen", "4pen", "5pen", "6pen", "7pen", "8pen", "9pen", "10pen", "pagepen", "knightpen", "queenpen", "kingpen"
        ];

        const lenormandDeck = [
            "1rider", "2clover", "3ship", "4house", "5tree", "6clouds", "7snake", "8coffin",
            "9bouquet", "10scythe", "11whip", "12birds", "13child", "14fox", "15bear", "16stars",
            "17stork", "18dog", "19tower", "20garden", "21mountain", "22crossroads", "23mice", "24heart",
            "25ring", "26book", "27letter", "28man", "29woman", "30lilies", "31sun", "32moon",
            "33key", "34fish", "35anchor", "36cross"
        ];

        const chakraDeck = [
            "abundance", "acceptance", "balance", "bittersweet", "complacency", "completion", "confusion",
            "creation", "despondence", "destiny", "discovery", "dissipating", "enlightenment", "expansion", "facade", "faith", "forgiveness", "gossip", "gratitude", 
            "grief", "growth", "guilt", "impartiality", "impasse", "impatience", "insecurity", "instinct", "isolation", "joy", "miracle", "mysticism", "passion", "perception",
            "perfection", "perseverance", "prayer", "quest", "recovery", "rejection", "release", "renewal", "selfworth", "service", "soulmate", "trickery", "vanity", "victim", "wisdom", "workaholic"
        ];

        const pathTarot = "assets/images/new_folder/";
        const pathLenormand = "assets/images/lenormand/";
        const pathChakra = "assets/images/oracle/";
        
        const backTarot = pathTarot + "card-back.PNG";
        const backLenormand = pathLenormand + "card-back-L.jpg"; 
        const backChakra = pathChakra + "card-back-C.PNG";

        let currentTarotDeck = [];
        let currentLenormandDeck = [];
        let currentChakraDeck = [];
        let drawnCardsList = []; 
        let totalCardsToDraw = 0;
        let flippedCount = 0;    
        let isProcessing = false; 
        let cooldownTimer = null; 
        const REVERSAL_THRESHOLD = 30; 

        // --- DOM Elements ---
        const btnShuffle = document.getElementById("btn-shuffle");
        const btnDraw = document.getElementById("btn-draw");
        const board = document.getElementById("tarot-board");
        const statusMsg = document.getElementById("status-message");
        const readingStyleSelect = document.getElementById("reading-style");
        const spreadSelect = document.getElementById("spread-type");
        const readingBox = document.getElementById("reading-result");
        const readingContent = document.getElementById("reading-content");
        const btnCopy = document.getElementById("btn-copy");
        const readingPlaceholder = document.getElementById("reading-placeholder");

        // --- CẤU CẤU TRÚC DANH SÁCH SPREADS THEO DANH MỤC ICON ---
        const modernSpreadsHTML = `
            <option value="intent_all">💌 TOÀN DIỆN (What, Why, How? & When, Who?)</option>
            <option value="intent_what">💌 WHAT / YES-NO (1 lá Tarot thông điệp ngay lập tức)</option>
            <option value="intent_why">💌 WHY / HOW (Gốc rễ, nhân quả & Xu hướng sắp tới)</option>
            <option value="intent_when">💌 WHEN / WHO (Sự kiện, Thời gian & Con người cụ thể)</option>
            <option value="intent_mbs">💖 M.B.S (Tâm linh - Tâm lý - Đời thực)</option>
            <option value="intent_healing">💖 CHỮA LÀNH (Điểm nghẽn năng lượng & Giải pháp)</option>
            <option value="intent_relationship">💖 GƯƠNG SOI NHÂN DUYÊN (Tâm lý, Sự kiện & Bài học)</option>
            <option value="intent_dream">🔮 GIẢI MÃ GIẤC MƠ / TIỀM THỨC</option>
            <option value="intent_mirror">🔮 BẢN NGÃ (Vị thế & Sự thật)</option>
            <option value="intent_crossroads">🔮 NGÃ RẼ CUỘC ĐỜI (Công việc/Tình cảm: Hướng A hay B?)</option>
            <option value="intent_flow">🔮 DÒNG CHẢY SỰ KIỆN (Tiên tri diễn biến sự kiện thực)</option>
        `;

        const classicalSpreadsHTML = `
            <option value="classic_croix">⚜️ Tirage au Croix ⚜️</option>
            <option value="classic_ligne">⚜️ Tirage en ligne ⚜️</option>
            <option value="classic_grand_ourse">⚜️ Tirage de Grande Ourse ⚜️</option>
            <option value="classic_astrologique">⚜️ Tirage astrologique ⚜️</option>
            <option value="classic_celtique">⚜️ Tirage de Celtique ⚜️</option>
        `;

        // Đồng bộ danh sách câu hỏi khi thay đổi phong cách hệ thống
        function updateSpreadOptions() {
            if (readingStyleSelect.value === "modern") {
                spreadSelect.innerHTML = modernSpreadsHTML;
            } else {
                spreadSelect.innerHTML = classicalSpreadsHTML;
            }
            resetBoardState();
        }

        function resetBoardState() {
            if (isProcessing) return; 
            btnDraw.disabled = true;
            board.innerHTML = "";
            hideReading();
            document.body.classList.add("shuffling");
            setTimeout(() => document.body.classList.remove("shuffling"), 1200);
            statusMsg.innerText = "Hệ thống đã thay đổi cấu trúc trải bài. Hãy xào bài lại nhé!";
        }

        readingStyleSelect.addEventListener("change", updateSpreadOptions);
        spreadSelect.addEventListener("change", resetBoardState);
        
        // Khởi tạo danh sách lần đầu tiên khi tải ứng dụng
        spreadSelect.innerHTML = modernSpreadsHTML;

        function showReading() {
            readingBox.style.display = "flex";
            readingBox.style.flexDirection = "column";
            if (readingPlaceholder) readingPlaceholder.style.display = "none";
        }

        function hideReading() {
            readingBox.style.none = "none";
            readingBox.style.display = "none";
            if (readingPlaceholder) readingPlaceholder.style.display = "flex";
        }

                Nhà 1 (Cái tôi, bản ngã hiện tại): ${drawnCardsList[0].name}${getReversedStr(drawnCardsList[0])}, Nhà 2 (Tài sản, tài chính, giá trị cá nhân): ${drawnCardsList[1].name}${getReversedStr(drawnCardsList[1])}, Nhà 3 (Môi trường giao tiếp, tư duy học tập ngắn hạn): ${drawnCardsList[2].name}${getReversedStr(drawnCardsList[2])}, Nhà 4 (Gia đạo, tổ ấm, gốc rễ thầm kín): ${drawnCardsList[3].name}${getReversedStr(drawnCardsList[3])}, Nhà 5 (Sự sáng tạo, niềm vui cá nhân, chuyện tình cảm lãng mạn): ${drawnCardsList[4].name}${getReversedStr(drawnCardsList[4])}, Nhà 6 (Công việc thường nhật, sức khỏe thể chất): ${drawnCardsList[5].name}${getReversedStr(drawnCardsList[5])}, Nhà 7 (Mối quan hệ song phương, đối tác, người phối ngẫu): ${drawnCardsList[6].name}${getReversedStr(drawnCardsList[6])}, Nhà 8 (Sự chuyển hóa sâu sắc, khủng hoảng, tiền bạc người khác): ${drawnCardsList[7].name}${getReversedStr(drawnCardsList[7])}, Nhà 9 (Học vấn cao, triết lý sống, chuyến đi xa/định hướng lớn): ${drawnCardsList[8].name}${getReversedStr(drawnCardsList[8])}, Nhà 10 (Sự nghiệp, danh tiếng cá nhân, vị thế xã hội): ${drawnCardsList[9].name}${getReversedStr(drawnCardsList[9])}, Nhà 11 (Mạng lưới xã hội, bạn bè, lý tưởng tương lai): ${drawnCardsList[10].name}${getReversedStr(drawnCardsList[10])}, Nhà 12 (Góc tối khuất lấp, chướng ngại nghiệp quả, tiềm thức sâu): ${drawnCardsList[11].name}${getReversedStr(drawnCardsList[11])}. xác định mối liên kết sau để đưa ra lời luận giải: có xuất hiện lá ẩn chính không, lá ẩn chính đang nằm ở chu kỳ nào?, các yếu tố lặp số hoặc lặp các quân court trong bộ ẩn phụ không, những con số có nằm sát chu kỳ hoàn thành sự kiện không hay bắt đầu?. Hãy kiểm tra xem nguyên tố nào chiếm phần lớn tụ bài? Cả tụ bài có màu sắc tích cực hay tiêu cực Khoảng thời gian trong lá tương lai bắt buộc phải trả lời được nằm trong mốc thời gian nào. Hãy đan cài và kết nối các nhà chiêm tinh một cách linh hoạt để đưa ra cái nhìn tổng quan đa chiều nhất xung quanh thắc mắc của người xem.`;
            } else if (spreadMode === "classic_celtique") {
                spreadContext = `Trải bài Celtic Cross Thập Tự Celtic Cổ Điển (Tirage de Celtique) phân tích cấu trúc phức tạp bằng 10 lá bài Tarot: 
                Lá 1 (Tình cảnh trung tâm cốt lõi): ${drawnCardsList[0].name}${getReversedStr(drawnCardsList[0])}, Lá 2 (Lực tác động chéo/Thử thách hoặc đòn bẩy trực tiếp): ${drawnCardsList[1].name}${getReversedStr(drawnCardsList[1])}, Lá 3 (Ý thức tối cao hoặc mục tiêu đỉnh điểm hướng tới): ${drawnCardsList[2].name}${getReversedStr(drawnCardsList[2])}, Lá 4 (Nền tảng tiềm thức sâu xa/Căn cơ sự việc): ${drawnCardsList[3].name}${getReversedStr(drawnCardsList[3])}, Lá 5 (Quá khứ gần vừa rời xa): ${drawnCardsList[4].name}${getReversedStr(drawnCardsList[4])}, Lá 6 (Tương lai gần chuẩn bị hiển lộ): ${drawnCardsList[5].name}${getReversedStr(drawnCardsList[5])}, Lá 7 (Vị thế hiện tại, tâm lý thật của người hỏi): ${drawnCardsList[6].name}${getReversedStr(drawnCardsList[6])}, Lá 8 (Môi trường bên ngoài, người xung quanh tác động): ${drawnCardsList[7].name}${getReversedStr(drawnCardsList[7])}, Lá 9 (Hy vọng thầm kín hoặc nỗi sợ kìm hãm): ${drawnCardsList[8].name}${getReversedStr(drawnCardsList[8])}, Lá 10 (Kết luận chung cuộc dài hạn cuối cùng): ${drawnCardsList[9].name}${getReversedStr(drawnCardsList[9])}. Liên kết chặt chẽ phần vòng tròn thập tự (Lá 1 đến 6) và trục đứng kết quả (Lá 7 đến 10). xác định mối liên kết sau để đưa ra lời luận giải: có xuất hiện lá ẩn chính không, lá ẩn chính đang nằm ở chu kỳ nào?, các yếu tố lặp số hoặc lặp các quân court trong bộ ẩn phụ không, những con số có nằm sát chu kỳ hoàn thành sự kiện không hay bắt đầu?. Hãy kiểm tra xem nguyên tố nào chiếm phần lớn tụ bài? Cả tụ bài có màu sắc tích cực hay tiêu cực Khoảng thời gian trong lá tương lai bắt buộc phải trả lời được nằm trong mốc thời gian nào, để đưa ra câu trả lời chi tiết và thấu triệt toàn diện.`;
            }

            const promptText = `${roleContext} Người dùng đặt câu hỏi: "${question}". Trong quẻ này, ${spreadContext} Hãy viết bài luận giải bằng tiếng việt, phân tách các phần rõ ràng, ngôn từ thực tế (20% thiên thời ( có đúng lúc không?), 30% địa lợi ( có được trợ giúp, trợ lực nào không?), 40% nhân hòa ( có tiềm lực, năng lực không, có ý chí không?), không nhắc đến các cụm từ thiên thời địa lợi nhân hòa và % khi giải bài). Xưng hô là "mình" và "bạn". Tuyệt đối không nhắc đến các từ ngữ lập trình.`;

            const apiUrl = "https://tarotreading-eight.vercel.app/api/gemini";

            try {
                const response = await fetch(apiUrl, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ prompt: promptText })
                });
                
                const data = await response.json();
                
                if (data.error) {
                    const isQuotaError = response.status === 429 || (data.error.status === "RESOURCE_EXHAUSTED");
                    if (isQuotaError) {
                        readingContent.innerHTML = `🌙 Các vì sao đang nghỉ ngơi! Năng lượng vũ trụ đang nạp lại, bạn đợi 1 phút rồi thử bốc lại nhé! 💖`;
                    } else {
                        readingContent.innerHTML = `🌠 Tín hiệu chập chờn! Hãy thử xào bài và bốc lại nhé! ✨`;
                    }
                } else {
                    let aiResponse = data.candidates[0].content.parts[0].text;
                    aiResponse = aiResponse.replace(/\*\*(.*?)\*\*/g, '<b>$1</b>'); 
                    aiResponse = aiResponse.replace(/\n/g, '<br>'); 
                    readingContent.innerHTML = `✨ <b>THÔNG ĐIỆP TỪ VŨ TRỤ:</b><br><br>${aiResponse}`;
                }
            } catch (error) {
                readingContent.innerHTML = "📡 Trạm thu phát sóng tâm linh báo rớt mạng! Bạn kiểm tra mạng rồi thử lại nha! 🧚‍♀️";
            } finally {
                isProcessing = false;
                startCooldown(15);
                readingBox.scrollIntoView({ behavior: 'smooth', block: 'start' });
            }
        }

        function shuffleDeck() {
            if (isProcessing || btnShuffle.disabled) return;
            document.body.classList.add("shuffling");
            board.innerHTML = ""; 
            hideReading();
            btnDraw.disabled = true;

            currentTarotDeck = [...tarotDeck].sort(() => Math.random() - 0.5);
            currentLenormandDeck = [...lenormandDeck].sort(() => Math.random() - 0.5);
            currentChakraDeck = [...chakraDeck].sort(() => Math.random() - 0.5);
            
            statusMsg.innerText = "✨ Đang kết nối dòng chảy năng lượng... Hãy thả lỏng tâm trí nhé! ✨";
            drawnCardsList = []; 
            flippedCount = 0;    
            
            setTimeout(() => {
                document.body.classList.remove("shuffling"); 
                btnDraw.disabled = false; 
                statusMsg.innerText = "Năng lượng đã đồng điệu. Hãy hít một hơi thật sâu và ấn Bốc Bài!";
            }, 1200);
        }

        // ================= CẤU HÌNH PHÂN PHỐI LÁ BÀI & CẤU TRÚC LOGIC PHÂN BỔ =================
        function drawCards() {
            board.innerHTML = ""; 
            hideReading();
            drawnCardsList = [];
            flippedCount = 0;
            
            const spreadMode = spreadSelect.value; 
            let setupPlan = []; 

            const tarotPop = () => ({ type: 'tarot', name: currentTarotDeck.pop(), reversed: (Math.random() * 100) < REVERSAL_THRESHOLD });
            const lenormandPop = () => ({ type: 'lenormand', name: currentLenormandDeck.pop(), reversed: false });
            const chakraPop = () => ({ type: 'chakra', name: currentChakraDeck.pop(), reversed: false });

            if (spreadMode === "intent_what") {
                setupPlan.push(tarotPop());
            } else if (spreadMode === "intent_why") {
                setupPlan.push(tarotPop()); setupPlan.push(tarotPop()); setupPlan.push(tarotPop());
            } else if (spreadMode === "intent_when") {
                setupPlan.push(lenormandPop()); setupPlan.push(lenormandPop()); setupPlan.push(lenormandPop());
            } else if (spreadMode === "intent_all") {
                // Cải tiến hệ thống bốc 5 lá (3 Tarot + 2 Lenormand) cho phương án Toàn Diện
                setupPlan.push(tarotPop()); setupPlan.push(tarotPop()); setupPlan.push(tarotPop());
                setupPlan.push(lenormandPop()); setupPlan.push(lenormandPop());
            } else if (spreadMode === "intent_mbs") {
                setupPlan.push(chakraPop()); setupPlan.push(tarotPop()); setupPlan.push(lenormandPop());
            } else if (spreadMode === "intent_healing") {
                setupPlan.push(chakraPop()); setupPlan.push(tarotPop()); setupPlan.push(lenormandPop()); setupPlan.push(lenormandPop());
            } else if (spreadMode === "intent_crossroads") {
                setupPlan.push(tarotPop()); setupPlan.push(tarotPop()); setupPlan.push(tarotPop());
            } else if (spreadMode === "intent_flow") {
                setupPlan.push(lenormandPop()); setupPlan.push(lenormandPop()); setupPlan.push(lenormandPop()); setupPlan.push(lenormandPop()); setupPlan.push(lenormandPop());
            } else if (spreadMode === "intent_relationship") {
                setupPlan.push(tarotPop()); setupPlan.push(tarotPop()); setupPlan.push(lenormandPop()); setupPlan.push(lenormandPop()); setupPlan.push(chakraPop());
            } else if (spreadMode === "intent_dream") {
                setupPlan.push(chakraPop()); setupPlan.push(tarotPop()); setupPlan.push(lenormandPop());
            } else if (spreadMode === "intent_mirror") {
                setupPlan.push(tarotPop()); setupPlan.push(tarotPop()); setupPlan.push(tarotPop()); setupPlan.push(tarotPop()); setupPlan.push(tarotPop());
            }
            // PHÂN PHỐI LÁ BÀI HỆ CỔ ĐIỂN
            else if (spreadMode === "classic_croix") {
                setupPlan.push(tarotPop()); setupPlan.push(tarotPop()); setupPlan.push(tarotPop()); setupPlan.push(tarotPop()); setupPlan.push(tarotPop());
            } else if (spreadMode === "classic_ligne") {
                setupPlan.push(tarotPop()); setupPlan.push(tarotPop()); setupPlan.push(tarotPop());
            } else if (spreadMode === "classic_grand_ourse") {
                for(let i = 0; i < 7; i++) setupPlan.push(tarotPop());
            } else if (spreadMode === "classic_astrologique") {
                for(let i = 0; i < 12; i++) setupPlan.push(tarotPop());
            } else if (spreadMode === "classic_celtique") {
                for(let i = 0; i < 10; i++) setupPlan.push(tarotPop());
            }

            drawnCardsList = setupPlan;
            totalCardsToDraw = setupPlan.length;
            statusMsg.innerText = `Hãy chọn lật mở ${totalCardsToDraw} chương định mệnh đang hiển hiện...`;
            btnDraw.disabled = true; 

            setupPlan.forEach((cardObj, index) => {
                const cardSlot = document.createElement("div");
                cardSlot.classList.add("card-slot");
                
                let backImg = backTarot;
                let frontImg = '';
                
                if (cardObj.type === 'tarot') {
                    backImg = backTarot;
                    frontImg = `${pathTarot}${cardObj.name}.PNG`;
                } else if (cardObj.type === 'lenormand') {
                    backImg = backLenormand;
                    frontImg = `${pathLenormand}${cardObj.name}.PNG`;
                } else if (cardObj.type === 'chakra') {
                    backImg = backChakra; 
                    frontImg = `${pathChakra}${cardObj.name}.PNG`; 
                }
                
                let labelText = "Thấu Thị";
                if (spreadMode === "intent_why") {
                    labelText = ["Quá Khứ", "Hiện Tại", "Tương Lai"][index];
                } else if (spreadMode === "intent_when") {
                    labelText = `Sự Kiện ${index + 1}`;
                } else if (spreadMode === "intent_all") {
                    labelText = ["WHAT (Tarot)", "WHY (Tarot)", "HOW (Tarot)", "WHEN (Lenormand)", "WHO (Lenormand)"][index];
                } else if (spreadMode === "intent_mbs") {
                    labelText = ["Spirit (Luân Xa)", "Mind (Tâm Trí)", "Body (Hành Động)"][index];
                } else if (spreadMode === "intent_healing") {
                    labelText = ["Vết Thương", "Nguyên Nhân", "Giải Pháp", "Bổ Trợ"][index];
                } else if (spreadMode === "intent_crossroads") {
                    labelText = ["Hướng A", "Hướng B", "Lời Khuyên"][index];
                } else if (spreadMode === "intent_flow") {
                    labelText = ["Quá Khứ Xa", "Quá Khứ Gần", "Trọng Tâm", "Tương Lai Gần", "Kết Quả"][index];
                } else if (spreadMode === "intent_relationship") {
                    labelText = ["Tâm Lý Bạn", "Tâm Lý Họ", "Sự Kiện 1", "Sự Kiện 2", "Bài Học"][index];
                } else if (spreadMode === "intent_dream") {
                    labelText = ["Tiềm Thức", "Higher Self", "Dấu Hiệu"][index];
                } else if (spreadMode === "intent_mirror") {
                    labelText = ["Bản Ngã", "Tầm Nhìn", "Vị Thế", "Công Chúng", "Sự Thật"][index];
                }
                // HỆ THỐNG NHÃN LÁ BÀI CỔ ĐIỂN TRÊN THIẾT BỊ
                else if (spreadMode === "classic_croix") {
                    labelText = ["Trái (Pour)", "Phải (Contre)", "Trên (État)", "Dưới (Résultats)", "Giữa (Synthèse)"][index];
                } else if (spreadMode === "classic_ligne") {
                    labelText = ["Khởi Điểm", "Điểm Nút", "Phát Triển"][index];
                } else if (spreadMode === "classic_grand_ourse") {
                    labelText = `Sao Bắc Đẩu ${index + 1}`;
                } else if (spreadMode === "classic_astrologique") {
                    labelText = `Cung Nhà ${index + 1}`;
                } else if (spreadMode === "classic_celtique") {
                    labelText = `Vị Trí C.C ${index + 1}`;
                }

                cardSlot.innerHTML = `
                    <div class="card-label">${labelText}</div>
                    <div class="card-inner">
                        <div class="card-front"><img src="${backImg}" alt="Mặt sau" onerror="this.src='${backTarot}'"></div>
                        <div class="card-back">
                            <img src="${frontImg}" alt="${cardObj.name}" 
                                 class="${cardObj.reversed ? 'card-reversed' : ''}" 
                                 onerror="this.src='https://via.placeholder.com/150x260/fff/000?text=${cardObj.name}'">
                        </div>
                    </div>
                `;

                cardSlot.addEventListener("click", function() {
                    if (isProcessing) return;
                    if (!this.classList.contains("flipped")) {
                        this.classList.add("flipped");
                        flippedCount++; 
                        if (flippedCount === totalCardsToDraw) {
                            statusMsg.innerText = "🔮 Vũ trụ đang gửi tín hiệu xuống cho bạn nè...🔮";
                            getFullTarotReading(); 
                        } else {
                            statusMsg.innerText = `Lật tiếp đi bạn, còn ${totalCardsToDraw - flippedCount} lá nữa thôi!`;
                        }
                    }
                });
                board.appendChild(cardSlot);
            });
        }

        btnShuffle.addEventListener("click", shuffleDeck);
        btnDraw.addEventListener("click", drawCards);
    </script>
</body>
</html>
