<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trạm Lắng Nghe Vũ Trụ © 2026 All Rights Reserved - developed by Nguyen842</title>
    <style>
        /* ================= CSS VARIABLES ================= */
        :root {
            --bg-main: #1a0b2e;
            --bg-panel: #2a164d;
            --text-main: #e5d3b3;
            --accent-gold: #c29d59;
            --accent-gold-hover: #e5d3b3; 
            --text-muted: #c4b5fd;
            --border-color: rgba(74, 43, 125, 0.5);
        }

        /* ================= RESET & CƠ BẢN ================= */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-main);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 10px 16px; /* Giảm padding tổng để tối ưu không gian */
            min-height: 100vh;
            overflow-x: hidden; 
            -webkit-text-size-adjust: 100%;
        }

        /* ================= HEADER ĐỘNG (ANIMATED HEADER) ================= */
        #app-header {
            display: flex;
            flex-wrap: wrap;
            width: 100%;
            transition: all 0.6s cubic-bezier(0.25, 1, 0.5, 1);
            margin-bottom: 15px;
        }

        .title-tab-group {
            display: flex;
            flex-direction: column;
            transition: all 0.6s cubic-bezier(0.25, 1, 0.5, 1);
        }

        h1 {
            margin-bottom: 5px;
            font-size: clamp(1.3rem, 2.5vw, 1.8rem); /* Thu nhỏ tiêu đề một chút */
            text-shadow: 0 0 15px var(--accent-gold);
            line-height: 1.2;
            transition: all 0.4s ease;
        }

        .tabs-container {
            display: flex;
            gap: 8px;
            transition: all 0.4s ease;
        }

        .tab-btn {
            background: var(--bg-panel);
            color: var(--text-muted);
            border: 1px solid var(--border-color);
            padding: 8px 16px; /* Nút nhỏ gọn hơn */
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: bold;
            transition: all 0.3s ease;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        .tab-btn:hover { color: var(--accent-gold-hover); border-color: var(--accent-gold); background: rgba(74, 43, 125, 0.3); }
        .tab-btn.active { background: var(--accent-gold); color: var(--bg-main); border-color: var(--accent-gold); box-shadow: 0 0 10px var(--accent-gold); }

        /* --- TRẠNG THÁI HEADER KHI Ở TAB GIỚI THIỆU --- */
        #app-header.intro-mode .title-tab-group {
            width: 100%;
            align-items: center;
            justify-content: center;
            margin-top: 1vh;
        }
        #app-header.intro-mode .controls-group {
            width: 0%;
            opacity: 0;
            transform: translateX(30px);
            pointer-events: none;
            height: 0;
            overflow: hidden;
        }

        /* --- TRẠNG THÁI HEADER KHI Ở TAB BỐC BÀI (TRƯỢT LÊN GÓC) --- */
        #app-header.reading-mode {
            flex-direction: row;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid rgba(194, 157, 89, 0.2);
            padding-bottom: 12px;
        }
        #app-header.reading-mode .title-tab-group {
            width: 32%; /* Đẩy sang trái 1/3 màn hình */
            align-items: flex-start;
        }
        #app-header.reading-mode h1 { text-align: left; }
        
        #app-header.reading-mode .controls-group {
            width: 66%; /* Bảng điều khiển chiếm 2/3 màn hình bên phải */
            opacity: 1;
            transform: translateX(0);
            pointer-events: auto;
            height: auto;
        }

        /* ── BẢNG ĐIỀU KHIỂN (THU GỌN LÊN TOP NAV) ── */
        .controls-inner {
            display: grid;
            /* CẬP NHẬT: Ép ô Hệ thống nhỏ lại (0.7fr), ô Phương pháp giãn tối đa (2.2fr), ô Nút bấm vừa vặn (1.1fr) */
            grid-template-columns: 0.8fr 2.1fr 1.1fr; 
            grid-template-areas: 
                "q q q"
                "sys spread btns"
                "status status status";
            gap: 8px;
            background: rgba(0, 0, 0, 0.4);
            padding: 10px 14px;
            border-radius: 12px;
            border: 1px solid var(--border-color);
            width: 100%;
        }

        #user-question { grid-area: q; }
        #reading-style { grid-area: sys; }
        #spread-type { grid-area: spread; }
        .btn-group { grid-area: btns; display: flex; gap: 6px; }
        
        #status-message { 
            grid-area: status; 
            margin: 0; 
            font-size: 0.85rem; 
            font-style: italic; 
            color: var(--text-muted); 
            text-align: left;
            padding-left: 4px;
        }

        input[type="text"], select {
            padding: 8px 12px; 
            font-size: 0.9rem; /* Giảm size chữ input */
            border-radius: 6px;
            background: var(--bg-panel); color: white; border: 1px solid var(--accent-gold);
            width: 100%; outline: none; -webkit-appearance: none; appearance: none;
        }
        input::placeholder { color: #a78bfa; opacity: 0.7; }
        select { cursor: pointer; }

        .mystic-btn {
            padding: 8px 12px; font-size: 0.85rem; font-weight: bold; color: var(--bg-main);
            background-color: var(--accent-gold); border: none; border-radius: 6px;
            cursor: pointer; transition: all 0.2s;
            flex: 1; min-height: 34px; white-space: nowrap;
        }
        .mystic-btn:active:not(:disabled) { transform: scale(0.95); background-color: var(--accent-gold-hover); }
        @media (hover: hover) {
            .mystic-btn:hover:not(:disabled) { background-color: var(--accent-gold-hover); box-shadow: 0 0 10px var(--accent-gold); }
        }
        .mystic-btn:disabled { background-color: #555; color: #888; cursor: not-allowed; }

        /* ================= NỘI DUNG TABS (TỐI ƯU HIỂN THỊ) ================= */
        .tab-content {
            display: none;
            width: 100%;
            margin: 0 auto;
        }
        .tab-content.active { display: block; }

        @keyframes slideInRight { from { opacity: 0; transform: translateX(60px); } to { opacity: 1; transform: translateX(0); } }
        @keyframes slideOutLeft { from { opacity: 1; transform: translateX(0) scale(1); } to { opacity: 0; transform: translateX(-30px) scale(0.98); } }

        /* ── BỐ CỤC 4 Ô GIỚI THIỆU ── */
        #intro-container {
            width: 100%; max-width: 100%; 
            min-height: calc(100vh - 120px); 
            display: flex; flex-direction: column;
            margin: 0 auto;
        }

        #sheets-content {
            display: grid;
            grid-template-columns: repeat(4, 1fr); 
            gap: 16px; /* Giảm gap */
            width: 100%;
            flex-grow: 1; 
        }

        .intro-card {
            background: rgba(42, 22, 77, 0.7); border: 1px solid var(--border-color);
            border-radius: 12px; padding: 18px; text-align: left;
            display: flex; flex-direction: column; box-shadow: 0 6px 15px rgba(0,0,0,0.3);
            opacity: 0; transform: translateY(30px);
            animation: slideUpCard 0.6s cubic-bezier(0.25, 1, 0.5, 1) forwards;
        }
        .intro-card:nth-child(1) { animation-delay: 0.1s; } .intro-card:nth-child(2) { animation-delay: 0.2s; }
        .intro-card:nth-child(3) { animation-delay: 0.3s; } .intro-card:nth-child(4) { animation-delay: 0.4s; }

        @keyframes slideUpCard { to { opacity: 1; transform: translateY(0); } }

        .intro-card h2 { color: var(--accent-gold); margin-bottom: 10px; font-size: 1.1rem; border-bottom: 1px solid rgba(194, 157, 89, 0.2); padding-bottom: 8px; }
        .intro-card p { color: var(--text-main); line-height: 1.6; font-size: 0.9rem; flex-grow: 1; }
        .btn-jump { margin-top: 15px; width: 100%; font-size: 0.9rem; padding: 10px; }

        /* ── LAYOUT DESKTOP 2 CỘT CHO TAB BỐC BÀI ── */
        .app-layout {
            display: flex;
            gap: 15px; /* Khoảng cách giữa bàn bài và bảng kết quả */
            align-items: stretch;
            min-height: calc(100vh - 150px);
        }

        .panel-left {
            flex: 0 0 50%; /* Trải bài chiếm 50% */
            max-width: 50%;
            display: flex; flex-direction: column;
            border-right: 1px solid rgba(194, 157, 89, 0.15);
            padding-right: 15px;
        }

        .panel-right {
            flex: 1 1 50%; /* Giải bài chiếm 50% */
            display: flex; flex-direction: column;
            position: relative;
        }

        /* ── MOBILE RESPONSIVE ── */
        @media (max-width: 992px) {
            #sheets-content { grid-template-columns: repeat(2, 1fr); }
            #app-header.reading-mode { flex-direction: column; align-items: flex-start; }
            #app-header.reading-mode .title-tab-group, #app-header.reading-mode .controls-group { width: 100%; }
            #app-header.reading-mode .controls-group { margin-top: 12px; }
        }

        @media (max-width: 768px) {
            #sheets-content { grid-template-columns: 1fr; }
            .app-layout { flex-direction: column; min-height: unset; }
            .panel-left { flex: unset; max-width: 100%; border-right: none; border-bottom: 1px solid var(--border-color); padding-right: 0; padding-bottom: 20px; margin-bottom: 20px; }
            .panel-right { flex: unset; }
            .controls-inner { grid-template-areas: "q" "sys" "spread" "btns" "status"; grid-template-columns: 1fr; }
            
            /* Reset bố cục Grid sang Flexbox trên Mobile để tránh vỡ giao diện */
            .tarot-board.classic_croix,
            .tarot-board.classic_celtique {
                display: flex !important; 
                flex-wrap: wrap !important; 
                justify-content: center !important;
            }
            .classic_celtique .card-slot:nth-child(2) {
                transform: none !important;
                margin-top: 0 !important;
            }
        }

        /* --- BÀN BỐC BÀI & KÍCH THƯỚC LÁ BÀI (THU NHỎ LẠI) --- */
        .tarot-board { display: flex; flex-wrap: wrap; justify-content: center; gap: 30px 12px; margin: 15px 0; width: 100%; }
        
        /* ================= CÁC LAYOUT HÌNH HỌC ĐẶC THÙ ================= */
        /* 1. TRẢI BÀI CHỮ THẬP CỔ ĐIỂN (classic_croix - 5 lá) */
        .tarot-board.classic_croix {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            grid-template-rows: auto auto auto;
            gap: 20px 15px;
            justify-items: center;
            align-items: center;
        }
        .classic_croix .card-slot:nth-child(1) { grid-area: 2 / 1; } /* Pour - Trái */
        .classic_croix .card-slot:nth-child(2) { grid-area: 2 / 3; } /* Contre - Phải */
        .classic_croix .card-slot:nth-child(3) { grid-area: 1 / 2; } /* État - Trên */
        .classic_croix .card-slot:nth-child(4) { grid-area: 3 / 2; } /* Résultats - Dưới */
        .classic_croix .card-slot:nth-child(5) { grid-area: 2 / 2; } /* Synthèse - Giữa trung tâm */

        /* 2. CELTIC CROSS (classic_celtique - 10 lá) */
        .tarot-board.classic_celtique {
            display: grid;
            grid-template-columns: 1fr 1.2fr 1fr 1fr;
            grid-template-rows: repeat(4, 1fr);
            gap: 15px 10px;
            justify-items: center;
            align-items: center;
        }
        /* Vòng chữ thập bên trái (Cột 1, 2, 3) */
        .classic_celtique .card-slot:nth-child(1) { grid-area: 2 / 2 / 4 / 3; z-index: 1; margin-top: 20px;} /* Hiện tại - Lõi */
        .classic_celtique .card-slot:nth-child(2) { grid-area: 2 / 2 / 4 / 3; transform: rotate(90deg); z-index: 2; margin-top: 20px;} /* Thách thức - Vắt ngang */
        .classic_celtique .card-slot:nth-child(3) { grid-area: 1 / 2 / 2 / 3; } /* Ý thức - Đỉnh trên */
        .classic_celtique .card-slot:nth-child(4) { grid-area: 4 / 2 / 5 / 3; } /* Tiềm thức - Đáy dưới */
        .classic_celtique .card-slot:nth-child(5) { grid-area: 2 / 1 / 4 / 2; } /* Quá khứ - Bên trái */
        .classic_celtique .card-slot:nth-child(6) { grid-area: 2 / 3 / 4 / 4; } /* Tương lai - Bên phải */
        /* Cột đứng kết quả bên phải (Cột 4) */
        .classic_celtique .card-slot:nth-child(7) { grid-area: 4 / 4 / 5 / 5; } /* Vị thế cá nhân */
        .classic_celtique .card-slot:nth-child(8) { grid-area: 3 / 4 / 4 / 5; } /* Tác động môi trường */
        .classic_celtique .card-slot:nth-child(9) { grid-area: 2 / 4 / 3 / 5; } /* Hy vọng & Nỗi sợ */
        .classic_celtique .card-slot:nth-child(10) { grid-area: 1 / 4 / 2 / 5; } /* Kết quả chung cuộc */

        /* ================= POPUP GIỚI THIỆU TRẢI BÀI ================= */
        .spread-intro-popup {
            background: rgba(26, 11, 46, 0.9);
            border: 1px dashed var(--accent-gold);
            padding: 22px 30px;
            border-radius: 12px;
            color: var(--text-main);
            text-align: center;
            max-width: 500px;
            margin: 40px auto;
            box-shadow: 0 0 25px rgba(194, 157, 89, 0.15);
            animation: fadeInPopup 0.5s ease forwards;
            line-height: 1.6;
            font-size: 0.95rem;
            width: 100%;
        }
        .spread-intro-popup strong {
            color: var(--accent-gold);
            font-size: 1.2rem;
            display: block;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        @keyframes fadeInPopup {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .card-slot { 
            perspective: 1000px; 
            width: clamp(65px, 9vw, 95px); /* Thu nhỏ width (trước là 90-140) */
            height: clamp(113px, 15vw, 166px); /* Thu nhỏ height */
            cursor: pointer; position: relative; touch-action: manipulation; 
        }
        
       .card-label {
            /* Đẩy nhãn lên phía trên lá bài và mở rộng chiều ngang ra một chút để có không gian rớt dòng */
            position: absolute; bottom: 100%; left: 50%; transform: translateX(-50%); width: 140%;
            font-size: 0.65rem; color: var(--accent-gold); font-weight: bold;
            text-transform: uppercase; letter-spacing: 0.5px; text-shadow: 0 0 3px rgba(0,0,0,0.8);
            text-align: center; padding-bottom: 6px;
            line-height: 1.3; word-wrap: break-word;
        }

        .card-inner { width: 100%; height: 100%; position: relative; transition: transform 0.6s cubic-bezier(0.4, 0.2, 0.2, 1); transform-style: preserve-3d; }
        .card-slot.flipped .card-inner { transform: rotateY(180deg); }
        .card-front, .card-back {
            width: 100%; height: 100%; position: absolute; backface-visibility: hidden; -webkit-backface-visibility: hidden;
            border-radius: 6px; box-shadow: 0 4px 8px rgba(0,0,0,0.5); border: 1.5px solid var(--accent-gold);
        }
        .card-front { background-color: var(--bg-panel); }
        .card-front img, .card-back img { width: 100%; height: 100%; object-fit: cover; border-radius: 4px; pointer-events: none; }
        .card-back { transform: rotateY(180deg); background-color: #fff; }
        .card-slot .card-inner .card-back img.card-reversed { transform: rotate(180deg); }

        /* --- KẾT QUẢ GIẢI BÀI (THU GỌN FONT & PADDING) --- */
        .loading-dots::after { content: ''; animation: dots 1.4s infinite; }
        @keyframes dots { 0% {content:'';} 25% {content:'.';} 50% {content:'..';} 75% {content:'...';} }

        .reading-placeholder {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            flex: 1; color: rgba(196, 181, 253, 0.3); font-size: 0.9rem; font-style: italic; gap: 10px; padding: 20px; min-height: 200px;
        }
        .placeholder-icon { font-size: 2.5rem; opacity: 0.25; }

        #reading-result {
            background: rgba(42, 22, 77, 0.7); border: 1px solid var(--accent-gold); padding: 16px; border-radius: 10px;
            text-align: left; line-height: 1.7; font-size: 0.9rem; /* Giảm font size của reading */
            display: none; box-shadow: 0 0 20px rgba(194, 157, 89, 0.1); flex: 1; overflow-y: auto; max-height: calc(100vh - 160px);
        }

        .copy-btn-wrap { display: flex; justify-content: flex-end; margin-top: 15px; padding-top: 10px; border-top: 1px solid rgba(194, 157, 89, 0.3); }
        #btn-copy { display: flex; align-items: center; gap: 4px; padding: 6px 12px; font-size: 0.8rem; font-weight: bold; color: var(--bg-main); background-color: var(--accent-gold); border: none; border-radius: 6px; cursor: pointer; transition: 0.2s; }
        #btn-copy:active { transform: scale(0.96); background-color: var(--accent-gold-hover); }
        #btn-copy.copied { background-color: #4ade80; color: var(--bg-main); }

        #reading-result::-webkit-scrollbar { width: 4px; }
        #reading-result::-webkit-scrollbar-track { background: rgba(255,255,255,0.02); }
        #reading-result::-webkit-scrollbar-thumb { background: rgba(194, 157, 89, 0.4); border-radius: 4px; }
    </style>
</head>
<body>
    
    <header id="app-header" class="intro-mode">
        <div class="title-tab-group">
            <h1>🔮 Trạm Lắng Nghe Vũ Trụ</h1>
            <div class="tabs-container">
                <button class="tab-btn active" onclick="switchTab('tab-intro')">💌 Giới Thiệu</button>
                <button class="tab-btn" onclick="switchTab('tab-reading')">✨ Bốc Bài</button>
            </div>
        </div>
        
        <div class="controls-group" id="controls-group">
            <div class="controls-inner">
                <input type="text" id="user-question" placeholder="💭 Bạn băn khoăn điều gì lúc này?">
                <select id="reading-style">
                    <option value="modern" selected>✨ Hiện Đại ✨</option>
                    <option value="classical">⚜️ Cổ Điển Pháp ⚜️</option>
                    <option value="mystic">🌌 Huyền Học & Tâm Lý 🌌</option>
                </select>
                <select id="spread-type"></select>
                <div class="btn-group">
                    <button id="btn-shuffle" class="mystic-btn">🔀 Xào Bài</button>
                    <button id="btn-draw" class="mystic-btn" disabled>✨ Bốc Bài</button>
                </div>
                <div id="status-message">✨ Đặt câu hỏi và ấn "Xào Bài"... ✨</div>
            </div>
        </div>
    </header>

    <div id="tab-intro" class="tab-content active">
        <div id="intro-container">
            <div id="loading-intro" style="text-align: center; color: var(--text-muted); font-style: italic; padding: 20px;">
                Đang kết nối luồng ánh sáng đến dữ liệu của Trạm... ⏳
            </div>
            <div id="sheets-content"></div>
        </div>
    </div>

    <div id="tab-reading" class="tab-content">
        <div class="app-layout">
            
            <div class="panel-left">
                <div id="tarot-board" class="tarot-board"></div>
            </div>

            <div class="panel-right">
                <div class="reading-placeholder" id="reading-placeholder">
                    <div class="placeholder-icon">🔮</div>
                    <div>Thông điệp vũ trụ sẽ hiện ra ở đây...</div>
                </div>

                <div id="reading-result">
                    <div id="reading-content"></div>
                    <div class="copy-btn-wrap">
                        <button id="btn-copy">
                            <span id="copy-icon">🔮</span>
                            <span id="copy-label">Sao chép</span>
                        </button>
                    </div>
                </div>
            </div>
            
        </div>
    </div>

    <script>
        // --- LOGIC CHUYỂN TABS & ĐIỀU KHIỂN HEADER ---
        function switchTab(tabId) {
            const currentActive = document.querySelector('.tab-content.active');
            const nextActive = document.getElementById(tabId);
            const header = document.getElementById('app-header');
            
            if (currentActive === nextActive) return;

            // Đổi class cho Header để kích hoạt hiệu ứng trượt/thu phóng bảng điều khiển
            if (tabId === 'tab-reading') {
                header.classList.remove('intro-mode');
                header.classList.add('reading-mode');
            } else {
                header.classList.remove('reading-mode');
                header.classList.add('intro-mode');
            }

            document.querySelectorAll('.tab-btn').forEach(btn => {
                if (btn.getAttribute('onclick').includes(tabId)) {
                    btn.classList.add('active');
                } else {
                    btn.classList.remove('active');
                }
            });

            currentActive.style.animation = "slideOutLeft 0.3s cubic-bezier(0.77, 0, 0.175, 1) forwards";
            
            setTimeout(() => {
                currentActive.classList.remove('active');
                currentActive.style.animation = ""; 
                
                nextActive.classList.add('active');
                nextActive.style.animation = "slideInRight 0.5s cubic-bezier(0.77, 0, 0.175, 1) forwards";
            }, 280); 
        }

        // --- GỌI API GOOGLE SHEETS LẤY DỮ LIỆU GIỚI THIỆU ---
        async function fetchIntroData() {
            const contentDiv = document.getElementById('sheets-content');
            const loadingDiv = document.getElementById('loading-intro');
            const apiUrl = 'https://tarotreading-eight.vercel.app/api/sheets';

            try {
                const response = await fetch(apiUrl);
                const data = await response.json();

                if (data.valueRanges && data.valueRanges.length > 0) {
                    loadingDiv.style.display = 'none';
                    let htmlOutput = '';
                    const totalSheets = data.valueRanges.length;

                    data.valueRanges.forEach((sheet, index) => {
                        const values = sheet.values || [];
                        const title = (values[0] && values[0][0]) ? values[0][0] : `Mục ${index + 1}`;
                        const content = (values[1] && values[1][0]) ? values[1][0] : `Nội dung đang được cập nhật...`;
                        const formattedContent = content.replace(/\n/g, '<br>');

                        let btnHtml = '';
                        if (index === totalSheets - 1 || index === 3) {

                    const isQuotaError = response.status === 429 || (data.error.status === "RESOURCE_EXHAUSTED");

                        readingContent.innerHTML = `🌙 Các vì sao đang nghỉ ngơi! Năng lượng đang nạp lại, bạn đợi 1 phút rồi thử bốc lại nhé! 💖`;

        function shuffleDeck() {
            if (isProcessing || btnShuffle.disabled) return;
            
            // Giữ lại popup giới thiệu tương ứng khi đang xào bài
            const introText = spreadDescriptions[spreadSelect.value] || "<strong>✨ Sẵn sàng kết nối</strong><br>Đang xào bài và đồng bộ năng lượng...";
            board.innerHTML = `<div class="spread-intro-popup">${introText}</div>`; 
            board.className = "tarot-board"; // Đưa mặt bàn về flexbox tạm thời trong lúc xào

            hideReading();
            btnDraw.disabled = true;

            currentTarotDeck = [...tarotDeck].sort(() => Math.random() - 0.5);
            currentLenormandDeck = [...lenormandDeck].sort(() => Math.random() - 0.5);
            currentChakraDeck = [...chakraDeck].sort(() => Math.random() - 0.5);
            
            statusMsg.innerText = "✨ Đang kết nối dòng chảy... Hãy thả lỏng tâm trí! ✨";
            drawnCardsList = []; 
            flippedCount = 0;    
            
            setTimeout(() => {
                btnDraw.disabled = false; 
                statusMsg.innerText = "Đã đồng điệu. Hãy ấn Bốc Bài!";
            }, 1000);
        }

        function drawCards() {
            board.innerHTML = ""; // Popup tự động biến mất khi các lá bài được tạo ra
            hideReading();
            drawnCardsList = [];
            flippedCount = 0;
            
            const spreadMode = spreadSelect.value; 
            
            // Cập nhật class cấu trúc layout CSS Grid cho mặt bàn bài
            board.className = `tarot-board ${spreadMode}`;
            
            let setupPlan = []; 

            const tarotPop = () => ({ type: 'tarot', name: currentTarotDeck.pop(), reversed: (Math.random() * 100) < REVERSAL_THRESHOLD });
            const lenormandPop = () => ({ type: 'lenormand', name: currentLenormandDeck.pop(), reversed: false });
            const chakraPop = () => ({ type: 'chakra', name: currentChakraDeck.pop(), reversed: false });

            if (spreadMode === "intent_what") { setupPlan.push(tarotPop()); }
            else if (spreadMode === "intent_why") { setupPlan.push(tarotPop(), tarotPop(), tarotPop()); }
            else if (spreadMode === "intent_when") { setupPlan.push(lenormandPop(), lenormandPop(), lenormandPop()); }
            else if (spreadMode === "intent_all") { setupPlan.push(tarotPop(), tarotPop(), tarotPop(), lenormandPop(), lenormandPop()); }
            else if (spreadMode === "intent_mbs") { setupPlan.push(chakraPop(), tarotPop(), lenormandPop()); }
            else if (spreadMode === "intent_healing") { setupPlan.push(chakraPop(), tarotPop(), lenormandPop(), lenormandPop()); }
            else if (spreadMode === "intent_crossroads") { setupPlan.push(tarotPop(), tarotPop(), tarotPop()); }
            else if (spreadMode === "intent_flow") { setupPlan.push(lenormandPop(), lenormandPop(), lenormandPop(), lenormandPop(), lenormandPop()); }
            else if (spreadMode === "intent_relationship") { setupPlan.push(tarotPop(), tarotPop(), lenormandPop(), lenormandPop(), chakraPop()); }
            else if (spreadMode === "intent_dream") { setupPlan.push(chakraPop(), tarotPop(), lenormandPop()); }
            else if (spreadMode === "intent_mirror") { setupPlan.push(tarotPop(), tarotPop(), tarotPop(), tarotPop(), tarotPop()); }
            else if (spreadMode === "classic_croix") { setupPlan.push(tarotPop(), tarotPop(), tarotPop(), tarotPop(), tarotPop()); }
            else if (spreadMode === "classic_ligne") { setupPlan.push(tarotPop(), tarotPop(), tarotPop()); }
            else if (spreadMode === "classic_grand_ourse") { for(let i=0; i<7; i++) setupPlan.push(tarotPop()); }
            else if (spreadMode === "classic_astrologique") { for(let i=0; i<12; i++) setupPlan.push(tarotPop()); }
            else if (spreadMode === "classic_celtique") { for(let i=0; i<10; i++) setupPlan.push(tarotPop()); }
            // Khởi tạo số lượng lá cho các trải bài mới
            else if (spreadMode === "mystic_tree") { for(let i=0; i<10; i++) setupPlan.push(tarotPop()); }
            else if (spreadMode === "mystic_shadow") { for(let i=0; i<5; i++) setupPlan.push(tarotPop()); }
            else if (spreadMode === "mystic_johari") { for(let i=0; i<4; i++) setupPlan.push(tarotPop()); }

            setupPlan.forEach((cardObj, index) => {
                const cardSlot = document.createElement("div");
                cardSlot.classList.add("card-slot");

                else if (cardObj.type === 'chakra') { backImg = backChakra; frontImg = `${pathChakra}${cardObj.name}.PNG`; }

                else if (spreadMode === "intent_healing") { labelText = ["Vết Thương", "Nguyên Nhân", "Giải Pháp", "Bổ Trợ"][index]; }
                else if (spreadMode === "intent_crossroads") { labelText = ["Hướng A", "Hướng B", "Lời Khuyên"][index]; }
                else if (spreadMode === "intent_flow") { labelText = ["QK Xa", "QK Gần", "Trọng Tâm", "Tương Lai", "Kết Quả"][index]; }

                else if (spreadMode === "mystic_tree") { labelText = ["Kether (Vương Miện)", "Chokhmah (Trí Tuệ)", "Binah (Thấu Hiểu)", "Chesed (Trắc Ẩn)", "Gevurah (Sức Mạnh)", "Tiferet (Sắc Đẹp)", "Netzach (Chiến Thắng)", "Hod (Vinh Quang)", "Yesod (Nền Tảng)", "Malkuth (Vương Quốc)"][index]; }

                else if (spreadMode === "mystic_johari") { labelText = ["Vùng Mở", "Vùng Mù", "Vùng Ẩn", "Vùng Đóng"][index]; }
                else if (spreadMode === "mystic_karmic") { labelText = ["Tiền Kiếp", "Nợ Nghiệp", "Khế Ước", "Bài Học", "Giải Phóng"][index]; }

                cardSlot.innerHTML = `
                    <div class="card-label">${labelText}</div>
                    <div class="card-inner">
                        <div class="card-front"><img src="${backImg}" alt="Mặt sau" onerror="this.src='${backTarot}'"></div>
                        <div class="card-back"><img src="${frontImg}" alt="${cardObj.name}" class="${cardObj.reversed ? 'card-reversed' : ''}"></div>
                    </div>
                `;

                cardSlot.addEventListener("click", function() {
                    if (isProcessing) return;
                    if (!this.classList.contains("flipped")) {
                        this.classList.add("flipped");
                        flippedCount++; 
                        if (flippedCount === totalCardsToDraw) {
                            statusMsg.innerText = "🔮 Đang giải mã...🔮";
                            getFullTarotReading(); 
                        } else {
                            statusMsg.innerText = `Còn ${totalCardsToDraw - flippedCount} lá nữa!`;
                        }
                    }
                });
                board.appendChild(cardSlot);
            });
        }

        btnShuffle.addEventListener("click", shuffleDeck);
        btnDraw.addEventListener("click", drawCards);
